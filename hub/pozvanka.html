            <p style="color:var(--muted);font-size:14px;max-width:380px;margin:0 auto 20px;line-height:1.6">
              ${state.lang === 'sk'
                ? 'Zdieľajte vašu stránku s hosťami. Keď odpovedajú, ich potvrdenia sa zobrazia tu.'
                : 'Share your page with guests. Their responses will appear here as they reply.'}
            </p>
            <button class="btn btn-primary" onclick="openShareModal()">${t('btn_share')} ✦</button>
          </div>
        ` : `
          <div class="rsvp-stats">
            <div class="rsvp-stat">
              <div class="rsvp-stat-num">${yesCount}</div>
              <div class="rsvp-stat-label">${state.lang === 'sk' ? 'Príde' : 'Coming'}</div>
            </div>
            <div class="rsvp-stat">
              <div class="rsvp-stat-num">${rsvps.length}</div>
              <div class="rsvp-stat-label">${state.lang === 'sk' ? 'Odpovedí' : 'Replies'}</div>
            </div>
            <div class="rsvp-stat">
              <div class="rsvp-stat-num">${noCount}</div>
              <div class="rsvp-stat-label">${state.lang === 'sk' ? 'Neprídu' : 'Declined'}</div>
            </div>
          </div>

          <div class="rsvp-list">
            ${rsvps.slice().reverse().map(r => {
              // Newest RSVPs have per-person detail in `guestDetails`.
              // Fall back to older formats: `names` array, or just `name`.
              const details = (r.guestDetails && r.guestDetails.length)
                ? r.guestDetails
                : ((r.names && r.names.length) ? r.names : [r.name].filter(Boolean))
                    .map(n => ({ name: n, attending: !!r.attending }));
              const yesList = details.filter(d => d.attending);
              const noList = details.filter(d => !d.attending);
              const isMixed = yesList.length > 0 && noList.length > 0;
              const cardClass = yesList.length === 0 ? 'rsvp-no' : (isMixed ? 'rsvp-mixed' : 'rsvp-yes');
              return `
              <div class="rsvp-card ${cardClass}">
                <div class="rsvp-card-main">
                  <div class="rsvp-card-name">${esc(r.name)}</div>
                  ${details.length > 1 ? `
                    <div class="rsvp-card-people">
                      ${details.map(d => `
                        <span class="rsvp-card-person ${d.attending ? 'is-yes' : 'is-no'}">
                          ${d.attending
                            ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
                            : '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'}
                          ${esc(d.name)}
                        </span>
                      `).join('')}
                    </div>
                  ` : ''}
                  ${r.email ? `<a class="rsvp-card-email" href="mailto:${esc(r.email)}">✉ ${esc(r.email)}</a>` : ''}
                  ${r.note ? `<div class="rsvp-card-note">"${esc(r.note)}"</div>` : ''}
                </div>
                <div class="rsvp-card-side">
                  <div class="rsvp-card-status">
                    ${yesList.length === 0
                      ? (state.lang === 'sk' ? '✕ Nepríde' : '✕ No')
                      : (isMixed
                        ? (state.lang === 'sk' ? `${yesList.length} z ${details.length}` : `${yesList.length} of ${details.length}`)
                        : `✓ ${state.lang === 'sk' ? 'Prídu všetci' : 'All coming'}`)}
                  </div>
                  ${yesList.length > 1 ? `<div class="rsvp-card-guests">${yesList.length} ${state.lang === 'sk' ? 'osôb' : 'people'}</div>` : ''}
                  <div class="rsvp-card-date">${formatRsvpDate(r.at)}</div>
                </div>
              </div>
            `;}).join('')}
          </div>

          <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-soft" onclick="exportRsvps()">${state.lang === 'sk' ? '⬇ Stiahnuť CSV' : '⬇ Export CSV'}</button>
            <button class="btn btn-ghost" onclick="pushToPlanner()" title="${state.lang === 'sk' ? 'Pošli aktuálny zoznam hostí do svadobného plannera (musí byť na rovnakej doméne).' : 'Push the current guest list to the wedding planner (must be on the same domain).'}">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l7 7-7 7"/><path d="M3 12h18"/></svg>
              ${state.lang === 'sk' ? 'Odoslať do plannera' : 'Send to planner'}
            </button>
          </div>
        `}

        ${renderEditorFooter()}
      `;
    }

    case 'preview': return `
      <div class="section-head">
        <div class="kicker">${t('preview_kicker')}</div>
        <h2>${t('preview_title')}</h2>
      </div>
      <p style="font-family:var(--serif);font-size:17px;color:var(--muted);font-style:italic;margin-bottom:28px;line-height:1.6">${t('preview_desc')}</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="openPreview()">${t('btn_preview')} →</button>
        <button class="btn btn-primary" onclick="openShareModal()">${t('btn_share')} ✦</button>
      </div>

      ${renderEditorFooter()}
    `;
  }
  return '';
}

function renderEditorFooter() {
  const order = ['basic','story','program','info','photo','rsvp','preview'];
  const idx = order.indexOf(state.currentSection);
  const isFirst = idx === 0;
  const isLast = idx === order.length - 1;
  const isPreview = state.currentSection === 'preview';
  const backLabel = isFirst
    ? (state.lang === 'sk' ? '← Späť na úvod' : '← Back home')
    : (state.lang === 'sk' ? '← Späť' : '← Back');
  const backAction = isFirst ? 'backToLanding()' : 'prevSection()';
  return `
    <div class="editor-footer">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <button class="btn btn-soft" onclick="${backAction}">${backLabel}</button>
        <span class="saved-indicator" id="savedInd"></span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${!isLast ? `<button class="btn btn-ghost" onclick="nextSection()">${state.lang === 'sk' ? 'Ďalej' : 'Next'} →</button>` : ''}
        ${!isPreview ? `<button class="btn btn-primary" onclick="openShareModal()">${t('btn_share')}</button>` : ''}
      </div>
    </div>
  `;
}

function programRow(it, i) {
  return `
    <div class="program-item">
      <div class="program-item-header">
        <span class="program-item-index">${state.lang === 'sk' ? 'Bod' : 'Item'} ${i + 1}.</span>
        <button class="btn-tiny" onclick="removeProgram(${i})" title="${state.lang === 'sk' ? 'Odstrániť' : 'Remove'}">✕</button>
      </div>
      <div class="program-item-row">
        <label>${t('program_time')}</label>
        <input class="time-input" data-pi="${i}" data-pf="time" value="${esc(it.time)}" placeholder="14:00">
      </div>
      <div class="program-item-row">
        <label>${t('program_event')}</label>
        <input data-pi="${i}" data-pf="title" value="${esc(it.title)}" placeholder="${state.lang === 'sk' ? 'napr. Obrad' : 'e.g. Ceremony'}">
      </div>
      <div class="program-item-row">
        <label>${t('program_desc')}</label>
        <input data-pi="${i}" data-pf="desc" value="${esc(it.desc)}" placeholder="${state.lang === 'sk' ? 'napr. v kostole sv. Michala' : 'e.g. at the church'}">
      </div>
    </div>
  `;
}

function addProgramItem() {
  state.project.program.push({ time: '', title: '', desc: '' });
  const list = document.getElementById('programList');
  if (list) {
    list.innerHTML = state.project.program.map((it, i) => programRow(it, i)).join('');
    hookSection();
  }
  saveProject();
}
function removeProgram(i) {
  state.project.program.splice(i, 1);
  const list = document.getElementById('programList');
  if (list) {
    list.innerHTML = state.project.program.map((it, j) => programRow(it, j)).join('');
    hookSection();
    // Restore focus to the prior row's title input, or the add button
    const targetIdx = Math.min(i, state.project.program.length - 1);
    if (targetIdx >= 0) {
      const nextInput = list.querySelector(`input[data-pi="${targetIdx}"][data-pf="title"]`);
      if (nextInput) nextInput.focus();
    } else {
      const addBtn = document.querySelector('button.btn.btn-soft[onclick="addProgramItem()"]');
      if (addBtn) addBtn.focus();
    }
  }
  saveProject();
}

function nextSection() {
  const order = ['basic','story','program','info','photo','rsvp','preview'];
  const idx = order.indexOf(state.currentSection);
  if (idx < order.length - 1) goSection(order[idx+1]);
}
function prevSection() {
  const order = ['basic','story','program','info','photo','rsvp','preview'];
  const idx = order.indexOf(state.currentSection);
  if (idx > 0) goSection(order[idx-1]);
}
function backToLanding() {
  flushPendingInputs();
  state.currentSection = null;
  renderLanding(true);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pickPhoto(id, ev) {
  state.project.photoId = id;
  // Picking a preset photo means user wants that one, not their upload
  state.project.customPhoto = '';
  document.querySelectorAll('.photo-opt').forEach(el => el.classList.remove('selected'));
  if (ev && ev.currentTarget) ev.currentTarget.classList.add('selected');
  saveProject();
  updateThemePreview();
}

function setPhotoTab(tab) {
  // Only two tabs are supported now
  state.photoTab = (tab === 'upload') ? 'upload' : 'stock';
  // Re-render just the photo section
  const body = document.getElementById('editorBody');
  if (body) {
    body.innerHTML = renderSection('photo');
    hookSection();
    hookPhotoUploadZone();
  }
}

function handlePhotoUpload(ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    toast(state.lang === 'sk' ? 'Iba obrázky, prosím' : 'Images only please');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    toast(state.lang === 'sk' ? 'Obrázok je príliš veľký (max 5 MB)' : 'Image too large (max 5 MB)');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    // Downscale large images via canvas so we don't bloat localStorage.
    const img = new Image();
    img.onload = () => {
      const maxW = 1600;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUri = canvas.toDataURL('image/jpeg', 0.85);
      state.project.customPhoto = dataUri;
      saveProject();
      setPhotoTab('upload');
      toast(state.lang === 'sk' ? 'Fotka nahraná' : 'Photo uploaded');
    };
    img.onerror = () => {
      toast(state.lang === 'sk' ? 'Nepodarilo sa načítať obrázok' : 'Failed to load image');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeCustomPhoto() {
  state.project.customPhoto = '';
  saveProject();
  setPhotoTab('upload');
}

// Drag & drop for upload zone
function hookPhotoUploadZone() {
  const zone = document.querySelector('.photo-upload-zone');
  if (!zone) return;
  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
    zone.classList.add('is-dragover');
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('is-dragover'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('is-dragover');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    const input = document.getElementById('photoFileInput');
    if (input) {
      // Synthesize event-like object
      handlePhotoUpload({ target: { files: [file] } });
    }
  });
}
function pickTheme(id, ev) {
  state.project.themeId = id;
  document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('selected'));
  if (ev && ev.currentTarget) ev.currentTarget.classList.add('selected');
  saveProject();
  applyEditorTheme();
  updateThemePreview();
}

// Apply the chosen color theme to the editor itself so users see the change live.
// Skips in dark mode (dark palette wins there).
function applyEditorTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const root = document.documentElement;
  if (isDark) {
    ['--deep-wine','--rose-gold','--ivory','--gold','--rose-gold-soft'].forEach(v => root.style.removeProperty(v));
    return;
  }
  const theme = THEMES[state.project?.themeId] || THEMES.janveil;
  root.style.setProperty('--deep-wine', theme.primary);
  root.style.setProperty('--rose-gold', theme.accent);
  root.style.setProperty('--ivory', theme.bg);
  root.style.setProperty('--gold', theme.gold);
  root.style.setProperty('--rose-gold-soft', theme.soft);
}

function updateThemePreview() {
  const box = document.getElementById('themePreviewBox');
  if (!box) return;
  const p = state.project;
  const theme = THEMES[p.themeId] || THEMES.janveil;
  const names = [p.bride || (state.lang === 'sk' ? 'Nevesta' : 'Bride'), p.groom || (state.lang === 'sk' ? 'Ženích' : 'Groom')];
  box.style.backgroundImage = `url('${getActivePhotoUrl(p)}')`;
  box.innerHTML = `
    <div class="theme-preview-overlay"></div>
    <div class="theme-preview-text">
      <div class="theme-preview-kicker" style="color:${theme.soft}">${state.lang === 'sk' ? 'Ukážka' : 'Preview'}</div>
      <div class="theme-preview-names">
        ${esc(names[0])}<span style="font-family:var(--script);color:${theme.soft};font-size:0.6em;margin:0 0.15em">&amp;</span>${esc(names[1])}
      </div>
      <div class="theme-preview-date">${p.date ? formatDate(p.date, state.lang) : '— — —'}</div>
    </div>
  `;
}

function hookSection() {
  document.querySelectorAll('.editor-body input, .editor-body textarea').forEach(el => {
    el.addEventListener('input', () => {
      const id = el.id;
      if (id && id.startsWith('f_')) {
        const key = id.slice(2);
        state.project[key] = el.value;
        saveProject();
      }
      // program rows
      const pi = el.dataset.pi;
      const pf = el.dataset.pf;
      if (pi !== undefined && pf) {
        state.project.program[parseInt(pi)][pf] = el.value;
        saveProject();
      }
    });
  });
  // Upload zone drag & drop wiring (photo section)
  hookPhotoUploadZone();
}


function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function openPreview() {
  flushPendingInputs();
  // Inline preview — render the public page directly in this window.
  // Avoids window.open being blocked in sandboxed iframes.
  state.publicProject = JSON.parse(JSON.stringify(state.project));
  state.isPublicView = true;
  state.previewMode = true;
  renderPublic();
  window.scrollTo({ top: 0 });
}

function exitPreview() {
  state.isPublicView = false;
  state.previewMode = false;
  state.publicProject = null;
  // Reset any theme CSS vars the preview set on documentElement
  const root = document.documentElement;
  ['--deep-wine','--rose-gold','--ivory','--gold','--rose-gold-soft'].forEach(v => root.style.removeProperty(v));
  document.body.style.background = '';
  renderEditor();
  window.scrollTo({ top: 0 });
}

// Opens the owner's own project in the editor (triggered from public hash view).
// Clears the hash to return to a clean editor URL.
function openOwnInEditor() {
  const proj = state.publicProject;
  if (!proj) return;
  state.project = proj;
  state.isPublicView = false;
  state.publicProject = null;
  state.isOwnProject = false;
  state.currentSection = 'basic';
  sset('wed:last', proj.id);
  saveProject();
  // Remove any theme overrides from public view
  const root = document.documentElement;
  ['--deep-wine','--rose-gold','--ivory','--gold','--rose-gold-soft'].forEach(v => root.style.removeProperty(v));
  document.body.style.background = '';
  // Clean the URL — we don't want the hash to persist
  if (history && history.replaceState) {
    history.replaceState(null, '', location.pathname + location.search);
  }
  renderEditor();
  window.scrollTo({ top: 0 });
}

// ============ SHARE MODAL ============
function openShareModal() {
  flushPendingInputs();
  // Build a fully self-contained URL: project data lives in the hash, so any
  // guest who opens the link sees the page without needing a server.
  const hash = encodeProjectToHash(state.project);
  const base = location.origin + location.pathname;
  const url = base + '#data=' + hash;

  // URLs above ~2000 chars run into issues with WhatsApp, Messenger, SMS, and
  // many QR scanners. Warn the couple when their upload inflates the link.
  const urlLen = url.length;
  const tooLong = urlLen > 2500;
  const veryLong = urlLen > 8000; // QR code barely scannable beyond this

  const modal = document.createElement('div');
  modal.className = 'modal-backdrop';
  modal.id = 'shareModal';
  const qrHtml = veryLong
    ? `<div class="qr-warning">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div>
          <strong>${state.lang === 'sk' ? 'Odkaz je príliš veľký pre QR kód' : 'Link too long for QR code'}</strong>
          <p>${state.lang === 'sk' ? 'Fotka, ktorú ste nahrali, je veľká. QR kód by bol neskenovateľný. Odkaz cez kopírovanie funguje normálne.' : 'Your uploaded photo is large. QR code would be unreadable. The copy link still works.'}</p>
        </div>
      </div>`
    : `<div class="qr-box" id="qrcode">
         <div class="qr-loading">${state.lang === 'sk' ? 'Generujem QR kód…' : 'Generating QR code…'}</div>
       </div>`;
  modal.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeShareModal()" aria-label="${state.lang === 'sk' ? 'Zavrieť' : 'Close'}">✕</button>
      <h3>${t('share_title')}</h3>
      <p>${t('share_sub')}</p>
      ${qrHtml}
      <div class="share-link" id="shareLink" title="${esc(url)}">${esc(url.length > 120 ? url.slice(0, 117) + '…' : url)}</div>
      ${tooLong && !veryLong ? `<p class="share-warn">${state.lang === 'sk' ? 'Pozn.: odkaz je dlhší kvôli fotke. Funguje, ale QR kód môže byť obťažne skenovateľný.' : 'Note: your link is longer due to the photo. It works, but the QR code may be harder to scan.'}</p>` : ''}
      <div class="share-actions">
        <button class="btn btn-primary" onclick="copyLink(document.getElementById('shareModal').dataset.url)">${t('share_copy')}</button>
        ${navigator.share ? `<button class="btn btn-ghost" onclick="nativeShareLink()">${state.lang === 'sk' ? 'Zdieľať…' : 'Share…'}</button>` : ''}
        <button class="btn btn-ghost" onclick="openShareLink()">${t('share_open')}</button>
      </div>
    </div>
  `;
  modal.dataset.url = url;
  modal.onclick = closeShareModal;
  document.body.appendChild(modal);
  if (!veryLong) {
    renderQrCode(url);
  }
}

// QR code generation — use a server-side QR API rendered as an <img>. This is
// rock-solid and works across all environments (sandbox, file://, mobile).
// Falls back to a different provider if the first one fails.
// QR code generator — embeds Kazuhiko Arase's qrcode-generator (MIT) inline.
// Source: https://github.com/kazuhikoarase/qrcode-generator
// Battle-tested, used by millions of sites. Works fully offline (no CDN).
// Provides global `qrcode(typeNumber, errorCorrectionLevel)`.
// We use type 0 (auto-pick smallest fitting version) and level 'L' (max data capacity).
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php
//
// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }

  closeShareModal();

// Uses Web Share API when available (mobile mainly) — opens the OS share sheet
// so users can send to any app: WhatsApp, Messenger, email, AirDrop, etc.
function nativeShareLink() {
  const url = document.getElementById('shareModal')?.dataset.url;
  if (!url || !navigator.share) return;
  const names = [state.project.bride, state.project.groom].filter(Boolean).join(' & ');
  navigator.share({
    title: names ? `${names} — ${state.lang === 'sk' ? 'Svadba' : 'Wedding'}` : 'Svadba',
    text: state.lang === 'sk' ? 'Naša svadobná stránka' : 'Our wedding page',
    url: url
  }).catch(() => {/* user cancelled or denied */});
}

  const m = document.getElementById('shareModal');

  const title = names ? `${names}${dateFmt ? ' · ' + dateFmt : ''}` : 'JanVeil — Svadba';
  const desc = names

        : `${names} are getting married${dateFmt ? ' on ' + dateFmt : ''}. RSVP online.`)

  document.title = title;
  setMetaTag('description', desc);
  setMetaTag('og:title', title, true);

// Builds rows for N guests — each row has: number, name input, and a yes/no
// pill toggle. Default state for newly-added rows is "Príde" (Coming).
// Preserves both names and per-person attendance from previous renders.
function renderGuestNameInputs(count, existing = []) {
  const rows = [];
  for (let i = 0; i < count; i++) {
    const prev = existing[i] || {};
    const v = prev.name ? esc(prev.name) : '';
    // Default new guests to attending=true; preserve existing choice if present
    const attending = (prev.attending === false) ? false : true;
    const placeholder = i === 0
      ? (state.lang === 'sk' ? 'Vaše meno' : 'Your name')
      : (state.lang === 'sk' ? `Hosť ${i + 1}` : `Guest ${i + 1}`);
    rows.push(`
      <div class="guest-row" data-guest-idx="${i}">
        <span class="guest-num">${i + 1}.</span>
        <input class="guest-name-input" data-guest-idx="${i}" value="${v}" placeholder="${placeholder}" autocomplete="${i === 0 ? 'name' : 'off'}">
        <div class="guest-att-toggle" role="group" aria-label="${state.lang === 'sk' ? 'Účasť' : 'Attendance'}">
          <button type="button" class="guest-att-btn att-yes ${attending ? 'is-active' : ''}" onclick="setGuestAttending(${i}, true)" title="${state.lang === 'sk' ? 'Príde' : 'Coming'}" aria-label="${state.lang === 'sk' ? 'Príde' : 'Coming'}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <button type="button" class="guest-att-btn att-no ${!attending ? 'is-active' : ''}" onclick="setGuestAttending(${i}, false)" title="${state.lang === 'sk' ? 'Nepríde' : 'Not coming'}" aria-label="${state.lang === 'sk' ? 'Nepríde' : 'Not coming'}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    `);
  }
  return rows.join('');
}

function setGuestAttending(idx, attending) {
  const row = document.querySelector(`.guest-row[data-guest-idx="${idx}"]`);
  if (!row) return;
  const yes = row.querySelector('.att-yes');
  const no = row.querySelector('.att-no');
  if (attending) {
    yes?.classList.add('is-active');
    no?.classList.remove('is-active');
  } else {
    no?.classList.add('is-active');
    yes?.classList.remove('is-active');
  }
}

function changeGuestCount(delta) {
  const input = document.getElementById('r_guests');
  if (!input) return;
  const cur = parseInt(input.value, 10) || 1;
  const next = Math.max(1, Math.min(10, cur + delta));
  if (next === cur) return;
  input.value = next;
  // Preserve both name and per-person attendance state when the list is rebuilt
  const existing = collectGuestRows();
  const list = document.getElementById('r_namesList');
  if (list) list.innerHTML = renderGuestNameInputs(next, existing);
}

// Read the current state of all guest rows: { name, attending } per row
function collectGuestRows() {
  return Array.from(document.querySelectorAll('.guest-row')).map(row => ({
    name: row.querySelector('.guest-name-input')?.value || '',
    attending: !!row.querySelector('.att-yes.is-active')
  }));
}

function submitRsvp() {
  const rows = collectGuestRows();
  // Filter to those with names — empty rows are ignored
  const filled = rows.filter(r => r.name.trim());
  if (!filled.length) {
    toast(state.lang === 'sk' ? 'Zadajte aspoň jedno meno' : 'Please enter at least one name');
    return;
  }

  const email = (document.getElementById('r_email')?.value || '').trim();
  const note = document.getElementById('r_note').value.trim();

  // Build a "guest detail" array preserving each person's choice
  const guestDetails = filled.map(r => ({ name: r.name.trim(), attending: !!r.attending }));
  const attendingNames = guestDetails.filter(g => g.attending).map(g => g.name);
  const decliningNames = guestDetails.filter(g => !g.attending).map(g => g.name);
  const anyAttending = attendingNames.length > 0;

  const fresh = loadProject(state.publicProject.id);
  const base = fresh || state.publicProject;
  base.rsvps = base.rsvps || [];
  // We store ONE entry per submission containing all guests; the entry's
  // top-level `attending` reflects whether *anyone* in the group is coming.
  // Per-person detail lives in `guestDetails`.
  base.rsvps.push({
    name: guestDetails[0].name,
    names: guestDetails.map(g => g.name), // back-compat: just the names
    guestDetails: guestDetails, // new: per-person attendance
    email,
    attending: anyAttending,
    guests: attendingNames.length,
    note,
    at: Date.now()
  });
  sset(`wed:${base.id}`, JSON.stringify(base));
  // Push to the shared planner feed so a wedding planner app on the same
  // origin can pick up the guests automatically (see writeToPlannerFeed).
  writeToPlannerFeed(base);
  state.publicProject = base;

  // Customize the thank-you message to match what was actually submitted
  let thanksTitle, thanksSub;
  if (attendingNames.length === filled.length) {
    // Everyone's coming
    thanksTitle = t('rsvp_thanks');
    thanksSub = t('rsvp_thanks_sub');
  } else if (attendingNames.length === 0) {
    // Nobody's coming
    thanksTitle = state.lang === 'sk' ? 'Ďakujeme za odpoveď' : 'Thanks for letting us know';
    thanksSub = state.lang === 'sk' ? 'Mrzí nás, že nemôžete prísť. Budete nám chýbať.' : "We'll miss you. Thanks for replying.";
  } else {
    // Mixed — some yes, some no
    thanksTitle = t('rsvp_thanks');
    thanksSub = state.lang === 'sk'
      ? `Ďakujeme. Tešíme sa na ${attendingNames.join(', ')}.`
      : `Thank you. We look forward to seeing ${attendingNames.join(', ')}.`;
  }

  document.getElementById('rsvpWrap').innerHTML = `
    <div class="rsvp-success">
      <div class="check">✓</div>
      <h2>${thanksTitle}</h2>
      <p style="font-family:var(--serif);font-size:17px;color:var(--muted);font-style:italic;margin-top:12px">${thanksSub}</p>
      ${anyAttending && base.date ? `
        <div class="rsvp-success-actions">
          <button class="btn btn-primary" onclick="downloadCalendar()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${state.lang === 'sk' ? 'Pridať do kalendára' : 'Add to calendar'}
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

// Generates an .ics file for the wedding so guests can one-click add it to
// their calendar. Works offline and in all calendar apps (Google, Apple, Outlook).
function downloadCalendar() {
  const p = state.publicProject;
  if (!p || !p.date) return;
  const startIso = p.date + 'T' + (p.time || '14:00') + ':00';
  const start = new Date(startIso);
  if (isNaN(start)) return;
  const end = new Date(start.getTime() + 6 * 3600 * 1000); // 6 hour default
  const fmtIcs = d => {
    const pad = n => String(n).padStart(2, '0');
    return d.getUTCFullYear() +
      pad(d.getUTCMonth() + 1) +
      pad(d.getUTCDate()) + 'T' +
      pad(d.getUTCHours()) +
      pad(d.getUTCMinutes()) + '00Z';
  };
  const names = [p.bride, p.groom].filter(Boolean).join(' & ') || 'Svadba';
  const title = state.lang === 'sk' ? `Svadba · ${names}` : `Wedding · ${names}`;
  const loc = [p.venue, p.venueAddr].filter(Boolean).join(', ');
  const desc = [p.reception && `${state.lang==='sk'?'Hostina':'Reception'}: ${p.reception}`, p.dresscode && `Dress code: ${p.dresscode}`].filter(Boolean).join('\\n');
  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//JanVeil//Svadba//SK',
    'BEGIN:VEVENT',
    'UID:' + p.id + '@janveil',
    'DTSTAMP:' + fmtIcs(new Date()),
    'DTSTART:' + fmtIcs(start),
    'DTEND:' + fmtIcs(end),
    'SUMMARY:' + title,
    loc ? 'LOCATION:' + loc.replace(/,/g, '\\,') : '',
    desc ? 'DESCRIPTION:' + desc : '',
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `svadba-${(p.bride||'').toLowerCase()}-${(p.groom||'').toLowerCase()}.ics`.replace(/\s+/g,'_');
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

function formatRsvpDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  if (sameDay) {
    return (state.lang === 'sk' ? 'dnes ' : 'today ') + h + ':' + m;
  }
  return `${d.getDate()}.${d.getMonth() + 1}. ${h}:${m}`;
}

// Count individual attending people across all RSVPs, handling both the new
// per-person format (`guestDetails`) and the legacy group format.
function countAttendingPeople(rsvps) {
  let n = 0;
  (rsvps || []).forEach(r => {
    if (r.guestDetails && r.guestDetails.length) {
      n += r.guestDetails.filter(d => d.attending).length;
    } else if (r.attending) {
      n += r.guests || 1;
    }
  });
  return n;
}

// ============ PLANNER BRIDGE ============
// Writes the current state of all RSVPs to a shared localStorage key the
// wedding planner app reads. Both apps must be on the same origin (same
// domain) for browser localStorage to be shared. The key name is intentionally
// neutral and the format is documented so any planner can consume it.
//
// Format: {
//   weddingId, bride, groom, date,
//   updatedAt: <ms timestamp>,
//   guests: [
//     { name, email, attending, partyName, note, respondedAt }
//   ]
// }
//
// One entry per individual guest (flattened from RSVP submissions). The
// `partyName` field tells the planner which RSVP submission a guest came from
// — useful when one person submits for the whole family.
const PLANNER_FEED_KEY = 'wedding:rsvp-feed';

function writeToPlannerFeed(project) {
  if (!project) return;
  try {
    const guests = [];
    (project.rsvps || []).forEach(r => {
      const details = (r.guestDetails && r.guestDetails.length)
        ? r.guestDetails
        : ((r.names && r.names.length) ? r.names : [r.name].filter(Boolean))
            .map(n => ({ name: n, attending: !!r.attending }));
      details.forEach(d => {
        guests.push({
          name: d.name || '',
          email: r.email || '',
          attending: !!d.attending,
          partyName: r.name || '',  // who submitted on behalf of the group
          note: r.note || '',
          respondedAt: r.at || 0
        });
      });
    });
    const payload = {
      weddingId: project.id,
      bride: project.bride || '',
      groom: project.groom || '',
      date: project.date || '',
      updatedAt: Date.now(),
      guests: guests
    };
    sset(PLANNER_FEED_KEY, JSON.stringify(payload));
    // Note: The 'storage' event fires automatically in OTHER tabs/windows on
    // the same origin — the planner just listens for it and refreshes.
  } catch (e) {
    // Storage might be full or blocked — silently ignore (the feed is a bonus,
    // not the source of truth, which lives in `wed:<id>`).
  }
}

// Manually push the current project's RSVPs to the planner feed. Lets the
// couple force a refresh from the editor (e.g. after deleting a test RSVP).
function pushToPlanner() {
  if (!state.project) return;
  // Pull the freshest version from storage in case guests added RSVPs since
  // the editor was opened.
  const fresh = loadProject(state.project.id) || state.project;
  writeToPlannerFeed(fresh);
  toast(state.lang === 'sk'
    ? 'Hostia odoslaní do plannera'
    : 'Guests sent to planner');
}

function exportRsvps() {
  const rsvps = (state.project.rsvps || []);
  if (!rsvps.length) return;
  // One row per individual person — much easier to use in Excel for seating, etc.
  const header = ['Meno hosťa', 'Hlavný odpovedajúci', 'Účasť', 'Email', 'Odkaz', 'Odpovedal'];
  const rows = [];
  rsvps.forEach(r => {
    const details = (r.guestDetails && r.guestDetails.length)
      ? r.guestDetails
      : ((r.names && r.names.length) ? r.names : [r.name].filter(Boolean))
          .map(n => ({ name: n, attending: !!r.attending }));
    details.forEach(d => {
      rows.push([
        d.name || '',
        r.name || '',
        d.attending ? 'Áno' : 'Nie',
        r.email || '',
        (r.note || '').replace(/\n/g, ' '),
        new Date(r.at || 0).toLocaleString()
      ]);
    });
  });
  const csv = [header, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  // UTF-8 BOM for Excel compatibility
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rsvp-${state.project.bride || 'svadba'}-${state.project.groom || ''}.csv`.replace(/\s+/g, '_');
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  toast(state.lang === 'sk' ? 'CSV stiahnuté' : 'CSV downloaded');
}

function formatDate(iso, lang) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const months = T[lang].months;
  return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function formatTime(time, lang) {
  if (!time) return '';
  return time;
}

function getWeekdayName(iso, lang) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const skDays = ['nedeľa','pondelok','utorok','streda','štvrtok','piatok','sobota'];
  const enDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return (lang === 'sk' ? skDays : enDays)[d.getDay()];
}

function timeOfDayLabel(time, lang) {
  if (!time) return '';
  const h = parseInt(time.split(':')[0], 10);
  if (isNaN(h)) return '';
  if (lang === 'sk') {
    if (h < 5) return 'nocou';
    if (h < 12) return 'ráno';
    if (h < 17) return 'popoludní';
    if (h < 21) return 'večer';
    return 'v noci';
  } else {
    if (h < 5) return 'night';
    if (h < 12) return 'morning';
    if (h < 17) return 'afternoon';
    if (h < 21) return 'evening';
    return 'night';
  }
}

/* ============ CALENDAR POPOVER ============ */
function toggleDatePicker(ev) {
  ev.stopPropagation();
  const existing = document.querySelector('.dt-pop[data-pop="date"]');
  if (existing) { existing.remove(); document.getElementById('f_dateTrigger')?.classList.remove('is-open'); return; }
  closeAllPoppers();
  const trigger = document.getElementById('f_dateTrigger');
  if (!trigger) return;
  trigger.classList.add('is-open');
  const pop = document.createElement('div');
  pop.className = 'dt-pop';
  pop.dataset.pop = 'date';
  const initial = state.project.date ? new Date(state.project.date) : new Date();
  pop._viewYear = initial.getFullYear();
  pop._viewMonth = initial.getMonth();
  pop.onclick = (e) => e.stopPropagation();
  trigger.parentElement.appendChild(pop);
  renderCalendarInto(pop);
  setTimeout(() => document.addEventListener('click', closeAllPoppersOnce, { once: true }), 0);
}

function closeAllPoppers() {
  document.querySelectorAll('.dt-pop').forEach(el => el.remove());
  document.querySelectorAll('.dt-trigger.is-open').forEach(el => el.classList.remove('is-open'));
}
function closeAllPoppersOnce() { closeAllPoppers(); }

function renderCalendarInto(pop) {
  const y = pop._viewYear, m = pop._viewMonth;
  const monthsSK = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
  const monthsEN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const months = state.lang === 'sk' ? monthsSK : monthsEN;
  const dowSK = ['Po','Ut','St','Št','Pi','So','Ne'];
  const dowEN = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dow = state.lang === 'sk' ? dowSK : dowEN;

  const first = new Date(y, m, 1);
  const firstDow = (first.getDay() + 6) % 7; // Monday-start
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysPrevMonth = new Date(y, m, 0).getDate();

  const selectedIso = state.project.date || '';
  const todayIso = new Date().toISOString().slice(0, 10);

  let cells = '';
  // leading days from prev month
  for (let i = firstDow - 1; i >= 0; i--) {
    const d = daysPrevMonth - i;
    cells += `<button class="dt-cal-day is-other-month" disabled>${d}</button>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const classes = ['dt-cal-day'];
    if (iso === todayIso) classes.push('is-today');
    if (iso === selectedIso) classes.push('is-selected');
    cells += `<button class="${classes.join(' ')}" onclick="pickDate('${iso}')">${d}</button>`;
  }
  // trailing to complete 6 rows (42 cells max, but at least 5 rows)
  const totalSoFar = firstDow + daysInMonth;
  const trailing = (7 - (totalSoFar % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    cells += `<button class="dt-cal-day is-other-month" disabled>${i}</button>`;
  }

  pop.innerHTML = `
    <div class="dt-cal-head">
      <button class="dt-cal-nav" onclick="navCal(-1)" aria-label="prev">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="dt-cal-title">${months[m]} ${y}</div>
      <button class="dt-cal-nav" onclick="navCal(1)" aria-label="next">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="dt-cal-grid">
      ${dow.map(d => `<div class="dt-cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="dt-cal-footer">
      <button onclick="pickDate('')">${state.lang === 'sk' ? 'Vymazať' : 'Clear'}</button>
      <button class="primary" onclick="pickDate('${todayIso}')">${state.lang === 'sk' ? 'Dnes' : 'Today'}</button>
    </div>
  `;
}

function navCal(delta) {
  const pop = document.querySelector('.dt-pop[data-pop="date"]');
  if (!pop) return;
  let y = pop._viewYear, m = pop._viewMonth + delta;
  if (m < 0) { m = 11; y--; }
  if (m > 11) { m = 0; y++; }
  pop._viewYear = y; pop._viewMonth = m;
  renderCalendarInto(pop);
}

function pickDate(iso) {
  state.project.date = iso;
  saveProject();
  closeAllPoppers();
  // Re-render just the trigger label
  const trigger = document.getElementById('f_dateTrigger');
  if (trigger) {
    if (iso) {
      trigger.innerHTML = `<span>${formatDate(iso, state.lang)}</span><span class="dt-trigger-script">${getWeekdayName(iso, state.lang)}</span>`;
    } else {
      trigger.innerHTML = `<span class="dt-trigger-placeholder">${state.lang === 'sk' ? 'Vyberte dátum' : 'Pick a date'}</span>`;
    }
  }
}

/* ============ TIME PICKER ============ */
function toggleTimePicker(ev) {
  ev.stopPropagation();
  const existing = document.querySelector('.dt-pop[data-pop="time"]');
  if (existing) { existing.remove(); document.getElementById('f_timeTrigger')?.classList.remove('is-open'); return; }
  closeAllPoppers();
  const trigger = document.getElementById('f_timeTrigger');
  if (!trigger) return;
  trigger.classList.add('is-open');
  const pop = document.createElement('div');
  pop.className = 'dt-pop';
  pop.dataset.pop = 'time';
  pop.onclick = (e) => e.stopPropagation();
  const [curH, curM] = (state.project.time || '14:00').split(':').map(n => parseInt(n, 10));
  const hours = [];
  for (let h = 0; h < 24; h++) hours.push(`<button class="dt-time-opt ${h === curH ? 'is-selected' : ''}" onclick="pickTimePart('h', ${h})">${String(h).padStart(2, '0')}</button>`);
  const minutes = [];
  for (let mn = 0; mn < 60; mn += 5) minutes.push(`<button class="dt-time-opt ${mn === curM ? 'is-selected' : ''}" onclick="pickTimePart('m', ${mn})">${String(mn).padStart(2, '0')}</button>`);
  pop.innerHTML = `
    <div class="dt-time-pop">
      <div class="dt-time-col">
        <div class="dt-time-label">${state.lang === 'sk' ? 'Hodina' : 'Hour'}</div>
        <div class="dt-time-scroll" id="dt-time-hours">${hours.join('')}</div>
      </div>
      <div class="dt-time-sep">:</div>
      <div class="dt-time-col">
        <div class="dt-time-label">${state.lang === 'sk' ? 'Minúta' : 'Minute'}</div>
        <div class="dt-time-scroll" id="dt-time-mins">${minutes.join('')}</div>
      </div>
    </div>
    <div class="dt-cal-footer">
      <button onclick="pickTimeClear()">${state.lang === 'sk' ? 'Vymazať' : 'Clear'}</button>
      <button class="primary" onclick="closeAllPoppers()">${state.lang === 'sk' ? 'Hotovo' : 'Done'}</button>
    </div>
  `;
  trigger.parentElement.appendChild(pop);
  // Scroll to selected
  setTimeout(() => {
    const hEl = pop.querySelector('#dt-time-hours .is-selected');
    const mEl = pop.querySelector('#dt-time-mins .is-selected');
    hEl?.scrollIntoView({ block: 'center' });
    mEl?.scrollIntoView({ block: 'center' });
  }, 10);
  setTimeout(() => document.addEventListener('click', closeAllPoppersOnce, { once: true }), 0);
}

function pickTimePart(part, value) {
  const cur = state.project.time || '14:00';
  const [h, m] = cur.split(':').map(n => parseInt(n, 10));
  const newH = part === 'h' ? value : h;
  const newM = part === 'm' ? value : m;
  state.project.time = `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
  saveProject();
  // Update trigger
  const trigger = document.getElementById('f_timeTrigger');
  if (trigger) trigger.innerHTML = `<span>${state.project.time}</span><span class="dt-trigger-script">${timeOfDayLabel(state.project.time, state.lang)}</span>`;
  // Update selected highlight in popover
  const pop = document.querySelector('.dt-pop[data-pop="time"]');
  if (pop) {
    const col = part === 'h' ? '#dt-time-hours' : '#dt-time-mins';
    pop.querySelectorAll(`${col} .dt-time-opt`).forEach((b, i) => {
      const bv = part === 'h' ? i : i * 5;
      b.classList.toggle('is-selected', bv === value);
    });
  }
}

function pickTimeClear() {
  state.project.time = '';
  saveProject();
  const trigger = document.getElementById('f_timeTrigger');
  if (trigger) trigger.innerHTML = `<span class="dt-trigger-placeholder">${state.lang === 'sk' ? 'Vyberte čas' : 'Pick a time'}</span>`;
  closeAllPoppers();
}

/* ============ ADDRESS AUTOCOMPLETE (Nominatim, OSM) ============ */
const addrCache = {};
let addrReqToken = 0;

function startCountdown(date, time) {
  const iso = date + 'T' + (time || '12:00');
  const target = new Date(iso).getTime();
  if (isNaN(target)) return;
  function tick() {
    const el = document.getElementById('countdown');
    if (!el) return;
    const now = Date.now();
    const diffRaw = target - now;

    // Day of the wedding — from midnight of wedding-day through midnight of next day
    const weddingDay = new Date(target);
    const weddingDayStart = new Date(weddingDay.getFullYear(), weddingDay.getMonth(), weddingDay.getDate()).getTime();
    const weddingDayEnd = weddingDayStart + 86400000;

    if (now >= weddingDayStart && now < weddingDayEnd) {
      // It's the wedding day!
      el.innerHTML = `
        <div class="countdown-celebrate">
          ${state.lang === 'sk' ? 'Náš deň je tu! ♡' : "Our day is here! ♡"}
        </div>
      `;
      return;
    }

    if (diffRaw <= 0) {
      // Post-wedding — show anniversary countdown or "married for X"
      const elapsed = now - target;
      const daysMarried = Math.floor(elapsed / 86400000);
      const yrs = Math.floor(daysMarried / 365);
      const labelDays = state.lang === 'sk'
        ? (daysMarried === 1 ? 'deň spolu' : (daysMarried < 5 ? 'dni spolu' : 'dní spolu'))
        : (daysMarried === 1 ? 'day together' : 'days together');
      el.innerHTML = `
        <div class="countdown-celebrate">
          ${state.lang === 'sk' ? 'Sme svoji ♡' : 'We said yes ♡'}
          <span class="countdown-mini">${yrs > 0 ? yrs + (state.lang === 'sk' ? (yrs===1?' rok a ':' roky a ') : (yrs===1?' year and ':' years and ')) + (daysMarried - yrs*365) + ' ' + labelDays : daysMarried + ' ' + labelDays}</span>
        </div>
      `;
      clearInterval(startCountdown._iv);
      return;
    }

    let diff = diffRaw;
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000); diff -= h * 3600000;
    const m = Math.floor(diff / 60000); diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    el.innerHTML = `
      <div class="countdown-unit"><div class="countdown-num">${d}</div><div class="countdown-label">${t('countdown_days')}</div></div>
      <div class="countdown-unit"><div class="countdown-num">${String(h).padStart(2,'0')}</div><div class="countdown-label">${t('countdown_hours')}</div></div>
      <div class="countdown-unit"><div class="countdown-num">${String(m).padStart(2,'0')}</div><div class="countdown-label">${t('countdown_min')}</div></div>
      <div class="countdown-unit"><div class="countdown-num">${String(s).padStart(2,'0')}</div><div class="countdown-label">${t('countdown_sec')}</div></div>
    `;
  }
  tick();
  clearInterval(startCountdown._iv);
  startCountdown._iv = setInterval(tick, 1000);
}

function renderNotFound() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderTopbar()}
    <div class="landing" style="text-align:center;padding:120px 24px">
      <div class="landing-kicker">404</div>
      <h1 class="landing-title"><em>${t('not_found')}</em></h1>
      <p class="landing-sub">${t('not_found_sub')}</p>
      <button class="btn btn-primary" onclick="location.href=location.pathname">${t('go_home')}</button>
    </div>
  `;
}

// ============ BOOT ============
applySavedTheme();
detectStorageAvailability();
route();

// Safety net — if the user closes the tab, switches apps on mobile, or the
// browser kills the page, force one final save. localStorage.setItem is
// synchronous, so this completes before the tab actually unloads.
window.addEventListener('beforeunload', () => {
  if (state.project && !state.isPublicView) {
    try { saveProject(); } catch {}
  }
});
// On mobile especially, "pagehide" / "visibilitychange" fire more reliably
// than beforeunload (iOS Safari often skips beforeunload).
window.addEventListener('pagehide', () => {
  if (state.project && !state.isPublicView) {
    try { saveProject(); } catch {}
  }
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && state.project && !state.isPublicView) {
    try { saveProject(); } catch {}
  }
});

// Warn the user up front if the browser refuses to persist anything (private
// browsing in iOS Safari, blocked storage). They'll lose data otherwise.
function detectStorageAvailability() {
  try {
    const testKey = '__svadba_test__';
    localStorage.setItem(testKey, '1');
    localStorage.removeItem(testKey);
  } catch {
    // Defer the toast so it appears after the first render
    setTimeout(() => {
      toast(state.lang === 'sk'
        ? 'Pozor: prehliadač blokuje ukladanie. Vaše zmeny sa môžu stratiť po zatvorení.'
        : 'Heads up: this browser blocks storage. Your changes may be lost when you close the page.', 6000);
    }, 1500);
  }
}
