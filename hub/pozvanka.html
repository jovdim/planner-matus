<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Vytvorte si elegantnú svadobnú webstránku s RSVP, QR zdieľaním a dvojjazyčnou podporou. JanVeil — svadobný salón.">
<title>JanVeil — Svadobné stránky</title>
<meta property="og:type" content="website">
<meta property="og:title" content="JanVeil — Svadobné stránky">
<meta property="og:description" content="Vytvorte si elegantnú svadobnú webstránku. Zdieľajte s hosťami cez odkaz alebo QR kód.">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23fbf8f3' stroke='%23b8a37a' stroke-width='2'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' font-family='Georgia, serif' font-style='italic' font-size='32' fill='%23b8a37a' font-weight='600'%3EJ%3C/text%3E%3C/svg%3E">
<!-- JanVeil Svadobná stránka — generátor svadobných web stránok -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Dancing+Script:wght@500;600;700&display=swap');

  :root {
    /* JanVeil palette — champagne, nude, soft gold. No red, no pink. */
    --ivory: #fbf8f3;
    --cream: #f1ebe0;
    --blush: #e4dac8;
    --rose-gold: #b8a37a;      /* champagne gold */
    --rose-gold-soft: #d4c4a1; /* soft champagne */
    --deep-wine: #3d352a;      /* warm dark taupe */
    --charcoal: #2a241e;
    --muted: #8a7e6c;
    --line: #e3d9c8;
    --gold: #c9a961;
    --shadow: 0 4px 20px rgba(61, 53, 42, 0.08);
    --shadow-lg: 0 12px 40px rgba(61, 53, 42, 0.12);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 22px;
    --radius-xl: 32px;
    --serif: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    --sans: 'Manrope', -apple-system, sans-serif;
    --script: 'Dancing Script', cursive;
  }

  /* ===== DARK MODE — still neutral, no red ===== */
  html[data-theme="dark"] {
    --ivory: #1a1713;
    --cream: #241f18;
    --blush: #3a3328;
    --rose-gold: #d4b882;
    --rose-gold-soft: #8a7850;
    --deep-wine: #e8dcc4;
    --charcoal: #f0e6d4;
    --muted: #a89a80;
    --line: #3a322a;
    --gold: #d4b87a;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.55);
  }
  html[data-theme="dark"] body::before {
    background-image:
      radial-gradient(ellipse at top left, rgba(212, 154, 163, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(212, 184, 122, 0.04), transparent 50%);
  }
  html[data-theme="dark"] .btn-primary {
    background: var(--rose-gold);
    color: var(--ivory);
  }
  html[data-theme="dark"] .btn-primary:hover {
    background: var(--deep-wine);
    color: var(--ivory);
  }
  html[data-theme="dark"] .feature { background: rgba(36, 29, 24, 0.6); }
  html[data-theme="dark"] .feature:hover { background: var(--cream); }
  html[data-theme="dark"] .editor-body { background: var(--cream); }
  html[data-theme="dark"] .field input,
  html[data-theme="dark"] .field textarea,
  html[data-theme="dark"] .field select {
    background: var(--ivory);
    color: var(--charcoal);
  }
  html[data-theme="dark"] .field input:focus,
  html[data-theme="dark"] .field textarea:focus {
    background: #0e0a08;
  }
  /* Program items in dark mode — inputs had white bg hard-coded */
  html[data-theme="dark"] .program-item { background: var(--ivory); }
  html[data-theme="dark"] .program-item input {
    background: var(--cream);
    color: var(--charcoal);
    border-color: var(--line);
  }
  html[data-theme="dark"] .program-item input:focus {
    background: #0e0a08;
  }
  html[data-theme="dark"] .program-item input.time-input {
    color: var(--deep-wine);
  }
  /* Map card footer in dark mode */
  html[data-theme="dark"] .map-card-footer { background: var(--cream); }
  /* Calendar popover day cells in dark mode */
  html[data-theme="dark"] .dt-cal-day { color: var(--charcoal); }
  html[data-theme="dark"] .dt-cal-day.is-other-month { color: var(--muted); opacity: 0.4; }
  html[data-theme="dark"] .dt-time-opt { color: var(--charcoal); }
  html[data-theme="dark"] .dt-picker .dt-trigger {
    background: linear-gradient(135deg, rgba(58, 51, 40, 0.5), rgba(36, 31, 24, 0.7));
    border-color: var(--blush);
    color: var(--deep-wine);
  }
  html[data-theme="dark"] .dt-picker .dt-trigger:hover,
  html[data-theme="dark"] .dt-picker .dt-trigger.is-open {
    background: var(--cream);
  }
  html[data-theme="dark"] .dt-picker.dt-date::before,
  html[data-theme="dark"] .dt-picker.dt-time::before {
    filter: brightness(2.5) saturate(0.4);
  }
  html[data-theme="dark"] .dt-time-scroll { background: var(--ivory); }
  html[data-theme="dark"] .info-card { background: var(--cream); }
  html[data-theme="dark"] .rsvp-wrap { background: var(--cream); }
  html[data-theme="dark"] .modal { background: var(--cream); }
  html[data-theme="dark"] .qr-box { background: #f0e6dc; }
  html[data-theme="dark"] .share-link { background: var(--ivory); color: var(--rose-gold); }
  html[data-theme="dark"] .topbar {
    background: rgba(26, 21, 18, 0.85);
  }
  html[data-theme="dark"] .preview-banner {
    background: linear-gradient(90deg, var(--cream), var(--blush));
    color: var(--deep-wine);
    border-bottom-color: var(--rose-gold-soft);
  }
  html[data-theme="dark"] .preview-banner .btn-soft {
    background: var(--ivory);
    color: var(--deep-wine);
    border-color: var(--rose-gold-soft);
  }
  html[data-theme="dark"] .hero::before {
    background: linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 50%, rgba(0,0,0,0.75) 100%);
  }
  html[data-theme="dark"] .public-footer { background: #0e0a08; color: var(--charcoal); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--ivory);
    color: var(--charcoal);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at top left, rgba(212, 165, 173, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(201, 169, 97, 0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; }

  /* ===== HEADER (matches planner design) ===== */
  /*
    Modeled after the JanVeil planner app's header so the two products feel
    like one suite. Key visual properties:
      - Sticky, translucent backdrop with blur
      - Hairline border bottom (#E5DFD3 light / #3D3528 dark)
      - JV monogram circle on the left, name + subtitle to its right
      - Gold (#9B7A45 / #D4B176 dark) accents for icons & links
      - Cormorant Garamond serif for the brand name
      - Inter for everything else (UI text, labels)
  */
  .jv-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(251, 248, 244, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #E5DFD3;
  }
  html[data-theme="dark"] .jv-header {
    background: rgba(26, 21, 16, 0.92);
    border-bottom-color: #3D3528;
  }
  .jv-header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .jv-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .jv-header-right {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  /* Brand button — JV monogram + JanVeil text */
  .jv-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }
  .jv-brand:hover { opacity: 0.85; }
  .jv-brand-mark {
    width: 40px;
    height: 40px;
    border: 1px solid #9B7A45;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.5s;
  }
  .jv-brand:hover .jv-brand-mark {
    background: #9B7A45;
  }
  html[data-theme="dark"] .jv-brand-mark { border-color: #D4B176; }
  html[data-theme="dark"] .jv-brand:hover .jv-brand-mark { background: #D4B176; }
  .jv-brand-mark-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: #9B7A45;
    transition: color 0.5s;
  }
  html[data-theme="dark"] .jv-brand-mark-text { color: #D4B176; }
  .jv-brand:hover .jv-brand-mark-text { color: white; }
  html[data-theme="dark"] .jv-brand:hover .jv-brand-mark-text { color: #1A1510; }

  .jv-brand-text {
    text-align: left;
    line-height: 1.1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .jv-brand-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #1E1910;
  }
  html[data-theme="dark"] .jv-brand-name { color: #EBE1CF; }
  .jv-brand-sub {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #9B7A45;
  }
  html[data-theme="dark"] .jv-brand-sub { color: #D4B176; }

  /* "← janveil.com" back link, hidden on mobile */
  .jv-back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #9B7A45;
    text-decoration: none;
    border-left: 1px solid #E5DFD3;
    padding-left: 16px;
    margin-left: 8px;
    transition: opacity 0.2s;
  }
  .jv-back-link:hover { opacity: 0.7; }
  html[data-theme="dark"] .jv-back-link { color: #D4B176; border-left-color: #3D3528; }

  /* SK/EN language toggle — pill button */
  .jv-lang-btn {
    background: none;
    border: 1px solid #E5DFD3;
    border-radius: 100px;
    padding: 6px 12px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #9B7A45;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .jv-lang-btn:hover { opacity: 0.7; }
  html[data-theme="dark"] .jv-lang-btn { border-color: #3D3528; color: #D4B176; }

  /* "Saved" indicator after autosave */
  .jv-saved-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9B7A45;
    animation: jvPulseSaved 1.5s ease;
  }
  html[data-theme="dark"] .jv-saved-indicator { color: #D4B176; }
  @keyframes jvPulseSaved {
    0% { opacity: 0; transform: translateY(-2px); }
    20% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Round icon button (theme toggle) */
  .jv-icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: none;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #9B7A45;
    transition: opacity 0.2s;
  }
  .jv-icon-btn:hover { opacity: 0.7; }
  html[data-theme="dark"] .jv-icon-btn { color: #D4B176; }
  .jv-icon-btn .icon-sun { display: none; }
  html[data-theme="dark"] .jv-icon-btn .icon-moon { display: none; }
  html[data-theme="dark"] .jv-icon-btn .icon-sun { display: block; }

  /* Text button (Share button on desktop) */
  .jv-text-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    padding: 6px 8px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9B7A45;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .jv-text-btn:hover { opacity: 0.6; }
  html[data-theme="dark"] .jv-text-btn { color: #D4B176; }

  /* Mobile/tablet: collapse less-essential bits */
  @media (max-width: 768px) {
    .jv-header-inner { padding: 12px 16px; }
    .jv-back-link { display: none; }
    .jv-brand-mark { width: 36px; height: 36px; }
    .jv-brand-name { font-size: 18px; }
    .jv-brand-sub { font-size: 9px; letter-spacing: 0.18em; }
    .jv-text-btn-label { display: none; }
    .jv-text-btn { padding: 8px; }
  }
  @media (max-width: 380px) {
    .jv-brand-text { display: none; }
  }

  /* ===== LEGACY TOPBAR (kept for any callers still using old classes) ===== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 40px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 241, 0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .brand {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.12em;
    color: var(--deep-wine);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 34px;
    height: 34px;
    border: 1.5px solid var(--rose-gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--script);
    color: var(--rose-gold);
    font-size: 18px;
    font-weight: 600;
  }
  .brand small {
    display: block;
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }
  .lang-switch {
    display: flex;
    gap: 4px;
    background: var(--cream);
    border-radius: 100px;
    padding: 4px;
  }
  .lang-switch button {
    background: none;
    border: none;
    padding: 6px 14px;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--muted);
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.2s;
  }
  .lang-switch button.active {
    background: var(--deep-wine);
    color: var(--ivory);
  }

  /* Theme (dark mode) toggle — legacy */
  .theme-toggle {
    background: var(--cream);
    border: 1px solid var(--line);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--deep-wine);
    transition: all 0.25s;
    margin-right: 8px;
  }
  .theme-toggle:hover {
    background: var(--blush);
    transform: rotate(15deg);
  }
  html[data-theme="dark"] .theme-toggle {
    background: var(--blush);
    color: var(--gold);
  }
  .theme-toggle svg { width: 18px; height: 18px; }
  .theme-toggle .icon-sun { display: none; }
  html[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  html[data-theme="dark"] .theme-toggle .icon-sun { display: block; }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 0;
  }

  /* ===== LANDING ===== */
  .landing {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px 100px;
  }
  .landing-hero {
    text-align: center;
    margin-bottom: 80px;
  }
  .landing-kicker {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--rose-gold);
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .landing-title {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(44px, 7vw, 84px);
    line-height: 1.05;
    color: var(--deep-wine);
    margin-bottom: 16px;
  }
  .landing-title em {
    font-family: var(--script);
    font-style: normal;
    color: var(--rose-gold);
    font-weight: 600;
  }
  .landing-sub {
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--muted);
    max-width: 580px;
    margin: 0 auto 40px;
    line-height: 1.5;
  }
  .landing-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Btns */
  .btn {
    font-family: var(--sans);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px 32px;
    border: none;
    cursor: pointer;
    transition: all 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    border-radius: 100px;
  }
  .btn-primary {
    background: var(--deep-wine);
    color: var(--ivory);
  }
  .btn-primary:hover {
    background: var(--rose-gold);
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
  }
  .btn-ghost {
    background: transparent;
    color: var(--deep-wine);
    border: 1px solid var(--deep-wine);
  }
  .btn-ghost:hover {
    background: var(--deep-wine);
    color: var(--ivory);
  }
  .btn-soft {
    background: var(--cream);
    color: var(--charcoal);
    border: 1px solid var(--line);
  }
  .btn-soft:hover { background: var(--blush); }

  /* Low-visual-weight delete/cancel style — for destructive secondary actions */
  .btn-link-muted {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 10px 14px;
    text-decoration: underline;
    text-decoration-color: transparent;
    text-underline-offset: 4px;
    transition: all 0.15s;
    font-weight: 500;
  }
  .btn-link-muted:hover {
    color: var(--deep-wine);
    text-decoration-color: var(--rose-gold-soft);
  }

  /* Feature cards */
  .features {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    margin-top: 60px;
  }
  .feature {
    padding: 24px 20px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid var(--line);
    text-align: left;
    transition: all 0.3s;
    border-radius: var(--radius-lg);
  }
  .feature:hover {
    background: white;
    box-shadow: var(--shadow);
    transform: translateY(-3px);
  }
  .feature-num {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 300;
    color: var(--rose-gold);
    font-style: italic;
    line-height: 1;
  }
  .feature h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 19px;
    margin: 8px 0 8px;
    color: var(--deep-wine);
    line-height: 1.25;
  }
  .feature p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Existing project banner */
  .existing {
    background: linear-gradient(135deg, var(--cream), var(--blush));
    border: 1px solid var(--rose-gold-soft);
    padding: 24px 28px;
    border-radius: var(--radius-lg);
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .existing-text h4 {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--deep-wine);
    margin-bottom: 4px;
  }
  .existing-text p { font-size: 13px; color: var(--muted); }

  /* ===== EDITOR ===== */
  .editor {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 40px;
  }

  .editor-nav {
    position: sticky;
    top: 100px;
    align-self: start;
  }
  .editor-nav h4 {
    font-family: var(--serif);
    font-size: 14px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .editor-nav ul { list-style: none; }
  .editor-nav li {
    padding: 10px 14px;
    margin-bottom: 4px;
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.2s;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .editor-nav li .nav-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--blush);
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .editor-nav li.is-done .nav-dot {
    background: var(--rose-gold);
    color: white;
  }
  .editor-nav li.active {
    color: var(--deep-wine);
    border-left-color: var(--rose-gold);
    background: var(--cream);
    font-weight: 500;
  }
  .editor-nav li.active .nav-dot:not(.is-done *) {
    background: var(--deep-wine);
    color: white;
  }
  .editor-nav li.active.is-done .nav-dot {
    background: var(--rose-gold);
    color: white;
  }
  .editor-nav li:hover:not(.active) { color: var(--charcoal); background: rgba(232, 213, 196, 0.3); }
  .editor-nav .nav-label { flex: 1; }
  .editor-nav .nav-tip {
    margin-top: 24px;
    padding: 16px;
    background: var(--cream);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    border-radius: var(--radius-md);
  }
  .editor-nav .nav-tip strong {
    display: block;
    color: var(--deep-wine);
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    text-transform: none;
    letter-spacing: normal;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .editor-body {
    background: white;
    border: 1px solid var(--line);
    padding: 40px;
    min-height: 600px;
    border-radius: var(--radius-xl);
  }

  .section-head {
    border-bottom: 1px solid var(--line);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  .section-head .kicker {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--rose-gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .section-head h2 {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 400;
    color: var(--deep-wine);
  }

  /* Form controls */
  .field { margin-bottom: 22px; }
  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--line);
    background: var(--ivory);
    font-family: var(--sans);
    font-size: 15px;
    color: var(--charcoal);
    transition: all 0.2s;
    border-radius: var(--radius-md);
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--rose-gold);
    background: white;
    box-shadow: 0 0 0 3px rgba(183, 110, 121, 0.1);
  }
  .field textarea { min-height: 110px; resize: vertical; font-family: var(--sans); }

  /* Custom date/time picker — styled wrapper with icon */
  .dt-picker {
    position: relative;
  }
  .dt-picker::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    background-repeat: no-repeat;
    background-size: contain;
    opacity: 0.6;
    pointer-events: none;
    z-index: 2;
  }
  .dt-picker.dt-date::before {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233d352a' stroke-width='1.5'><rect x='3' y='5' width='18' height='16' rx='2'/><line x1='3' y1='10' x2='21' y2='10'/><line x1='8' y1='3' x2='8' y2='7'/><line x1='16' y1='3' x2='16' y2='7'/></svg>");
  }
  .dt-picker.dt-time::before {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233d352a' stroke-width='1.5'><circle cx='12' cy='12' r='9'/><polyline points='12 7 12 12 15 14'/></svg>");
  }
  .dt-picker .dt-trigger {
    width: 100%;
    padding: 14px 18px 14px 48px;
    border: 1px solid var(--blush);
    background: linear-gradient(135deg, rgba(228, 218, 200, 0.25), rgba(251, 248, 243, 0.5));
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--deep-wine);
    transition: all 0.2s;
    border-radius: var(--radius-md);
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 52px;
  }
  .dt-picker .dt-trigger:hover {
    background: white;
    border-color: var(--rose-gold-soft);
  }
  .dt-picker .dt-trigger.is-open {
    background: white;
    border-color: var(--rose-gold);
    box-shadow: 0 0 0 3px rgba(184, 163, 122, 0.15);
  }
  .dt-picker .dt-trigger-placeholder { color: var(--muted); font-style: italic; }
  .dt-picker .dt-trigger-script {
    font-family: var(--script);
    color: var(--rose-gold);
    font-size: 18px;
    font-weight: 500;
  }

  /* Calendar popover */
  .dt-pop {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: white;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    border-radius: var(--radius-lg);
    padding: 20px;
    z-index: 500;
    min-width: 320px;
    animation: dtFade 0.2s ease-out;
  }
  @keyframes dtFade {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  html[data-theme="dark"] .dt-pop { background: var(--cream); }

  .dt-cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .dt-cal-title {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--deep-wine);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .dt-cal-nav {
    background: transparent;
    border: 1px solid var(--line);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--deep-wine);
    transition: all 0.15s;
  }
  .dt-cal-nav:hover { background: var(--cream); border-color: var(--rose-gold-soft); }

  .dt-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .dt-cal-dow {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    padding: 6px 0 10px;
    font-weight: 500;
  }
  .dt-cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 16px;
    color: var(--charcoal);
    cursor: pointer;
    border-radius: 50%;
    border: none;
    background: transparent;
    transition: all 0.15s;
    font-weight: 500;
  }
  .dt-cal-day:hover:not(:disabled) {
    background: var(--cream);
    color: var(--deep-wine);
  }
  .dt-cal-day.is-other-month { color: var(--line); font-weight: 400; }
  .dt-cal-day.is-today {
    border: 1px solid var(--rose-gold-soft);
  }
  .dt-cal-day.is-selected {
    background: var(--rose-gold);
    color: white;
    font-weight: 600;
  }
  .dt-cal-day.is-selected:hover { background: var(--deep-wine); }

  .dt-cal-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    gap: 8px;
  }
  .dt-cal-footer button {
    background: transparent;
    border: none;
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .dt-cal-footer button:hover { color: var(--deep-wine); background: var(--cream); }
  .dt-cal-footer button.primary { color: var(--rose-gold); font-weight: 600; }

  /* Time picker */
  .dt-time-pop {
    display: grid;
    grid-template-columns: 1fr 12px 1fr;
    gap: 10px;
    align-items: stretch;
    min-width: 240px;
  }
  .dt-time-col {
    display: flex;
    flex-direction: column;
  }
  .dt-time-label {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    padding: 0 0 8px;
    font-weight: 500;
  }
  .dt-time-scroll {
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 4px;
    background: var(--ivory);
    scrollbar-width: thin;
  }
  .dt-time-scroll::-webkit-scrollbar { width: 6px; }
  .dt-time-scroll::-webkit-scrollbar-thumb { background: var(--rose-gold-soft); border-radius: 3px; }
  .dt-time-opt {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: none;
    font-family: var(--serif);
    font-size: 16px;
    color: var(--charcoal);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all 0.1s;
    text-align: center;
  }
  .dt-time-opt:hover { background: var(--cream); color: var(--deep-wine); }
  .dt-time-opt.is-selected {
    background: var(--rose-gold);
    color: white;
    font-weight: 600;
  }
  .dt-time-sep {
    font-family: var(--serif);
    font-size: 28px;
    color: var(--rose-gold);
    align-self: center;
    padding-top: 18px;
    font-weight: 300;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  /* 4-column grid for compact related fields. Steps down responsively. */
  .field-grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 0;
  }
  /* Each .field already has its own bottom margin, but in a grid we don't want it */
  .field-grid-4 > .field { margin-bottom: 0; }
  .field-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  /* Photo picker */
  /* Photo source tabs */
  .photo-tabs {
    display: flex;
    gap: 4px;
    background: var(--cream);
    padding: 4px;
    border-radius: 100px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .photo-tab {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 14px;
    background: transparent;
    border: none;
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.2s;
    font-weight: 500;
  }
  .photo-tab:hover { color: var(--deep-wine); }
  .photo-tab.active {
    background: white;
    color: var(--deep-wine);
    box-shadow: 0 2px 8px rgba(61, 53, 42, 0.08);
  }
  html[data-theme="dark"] .photo-tab.active { background: var(--ivory); }

  /* Upload zone */
  .photo-upload-zone {
    border: 2px dashed var(--rose-gold-soft);
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, rgba(228, 218, 200, 0.3), rgba(251, 248, 243, 0.5));
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    position: relative;
  }
  .photo-upload-zone:hover {
    border-color: var(--rose-gold);
    background: linear-gradient(135deg, var(--cream), rgba(232, 213, 196, 0.5));
  }
  .photo-upload-zone.is-dragover {
    border-color: var(--rose-gold);
    background: var(--cream);
    transform: scale(1.01);
  }
  .photo-upload-empty {
    padding: 50px 20px;
    text-align: center;
    color: var(--muted);
  }
  .photo-upload-empty svg {
    opacity: 0.5;
    margin-bottom: 14px;
    color: var(--rose-gold);
  }
  .photo-upload-title {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--deep-wine);
    margin-bottom: 6px;
    font-style: italic;
    font-weight: 500;
  }
  .photo-upload-sub {
    font-size: 13px;
    color: var(--muted);
  }
  .photo-upload-preview {
    aspect-ratio: 16/9;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .photo-upload-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .photo-upload-preview:hover .photo-upload-overlay { opacity: 1; }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .photo-opt {
    aspect-ratio: 3/4;
    background: var(--cream);
    background-size: cover;
    background-position: center;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-md);
  }
  .photo-opt img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-opt-fallback {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--cream), var(--blush));
    color: var(--muted);
    font-family: var(--serif);
    font-size: 13px;
    font-style: italic;
    text-align: center;
    padding: 12px;
  }
  .photo-opt-failed img { display: none; }
  .photo-opt-failed .photo-opt-fallback { display: flex; }

  /* Stock photo tile with label overlay */
  .photo-opt-labeled {
    position: relative;
  }
  .photo-opt-label {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 10px;
    padding: 6px 10px;
    background: rgba(61, 53, 42, 0.75);
    color: #fbf8f3;
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    text-align: center;
    border-radius: 100px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.03em;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.2s;
  }
  .photo-opt-labeled:hover .photo-opt-label,
  .photo-opt-labeled.selected .photo-opt-label {
    opacity: 1;
    transform: translateY(0);
  }
  .photo-opt:hover { transform: scale(1.02); }
  .photo-opt.selected {
    border-color: var(--rose-gold);
    box-shadow: var(--shadow-lg);
  }
  .photo-opt.selected::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: var(--rose-gold);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }

  /* Theme picker */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  .theme-opt {
    padding: 16px;
    border: 2px solid var(--line);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    border-radius: var(--radius-md);
  }
  .theme-opt.selected {
    border-color: var(--rose-gold);
    background: var(--cream);
  }
  .theme-swatches {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .theme-swatches span {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .theme-opt .theme-name {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--deep-wine);
    font-style: italic;
  }

  /* RSVP editor section */
  .rsvp-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 30px;
  }
  .rsvp-stat {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 22px 16px;
    text-align: center;
  }
  .rsvp-stat-num {
    font-family: var(--serif);
    font-size: 42px;
    font-weight: 400;
    color: var(--deep-wine);
    line-height: 1;
  }
  .rsvp-stat-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 500;
  }
  html[data-theme="dark"] .rsvp-stat { background: var(--cream); }

  .rsvp-list {
    display: grid;
    gap: 12px;
  }
  .rsvp-card {
    background: var(--ivory);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    transition: all 0.2s;
    border-left-width: 4px;
  }
  .rsvp-card:hover {
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .rsvp-card.rsvp-yes { border-left-color: var(--rose-gold); }
  .rsvp-card.rsvp-no  { border-left-color: var(--muted); opacity: 0.85; }
  .rsvp-card.rsvp-mixed { border-left-color: var(--gold); }
  .rsvp-card-main { flex: 1; min-width: 0; }
  .rsvp-card-name {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--deep-wine);
    font-weight: 500;
    line-height: 1.2;
  }
  .rsvp-card-extras {
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
    line-height: 1.4;
  }
  .rsvp-card-people {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .rsvp-card-person {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px 3px 7px;
    border-radius: 100px;
    font-size: 12px;
    font-family: var(--serif);
    line-height: 1.4;
    border: 1px solid var(--line);
  }
  .rsvp-card-person.is-yes {
    background: rgba(184, 163, 122, 0.15);
    color: var(--deep-wine);
    border-color: var(--rose-gold-soft);
  }
  .rsvp-card-person.is-no {
    background: var(--cream);
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--rose-gold-soft);
    text-decoration-thickness: 1px;
  }
  .rsvp-card-person.is-yes svg { color: var(--rose-gold); }
  .rsvp-card-person.is-no svg { color: var(--muted); }
  .rsvp-card-email {
    display: inline-block;
    margin-top: 4px;
    font-size: 13px;
    color: var(--rose-gold);
    text-decoration: none;
  }
  .rsvp-card-email:hover { text-decoration: underline; }
  .rsvp-card-note {
    font-style: italic;
    font-family: var(--serif);
    color: var(--charcoal);
    font-size: 15px;
    margin-top: 8px;
    padding-left: 10px;
    border-left: 2px solid var(--rose-gold-soft);
    line-height: 1.5;
  }
  .rsvp-card-side {
    text-align: right;
    flex-shrink: 0;
  }
  .rsvp-card-status {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .rsvp-yes .rsvp-card-status { color: var(--rose-gold); }
  .rsvp-no  .rsvp-card-status { color: var(--muted); }
  .rsvp-card-guests {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--deep-wine);
    margin-top: 4px;
    font-style: italic;
  }
  .rsvp-card-date {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  html[data-theme="dark"] .rsvp-card { background: var(--cream); }

  @media (max-width: 640px) {
    .rsvp-stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .rsvp-stat { padding: 16px 8px; }
    .rsvp-stat-num { font-size: 32px; }
    .rsvp-card { flex-direction: column; align-items: stretch; }
    .rsvp-card-side { text-align: left; }
  }

  /* Live theme preview box */
  .theme-preview {
    position: relative;
    aspect-ratio: 16/7;
    background-size: cover;
    background-position: center;
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 32px;
    border: 1px solid var(--line);
    transition: all 0.3s;
  }
  .theme-preview-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.45) 100%);
  }
  .theme-preview-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    padding: 16px;
  }
  .theme-preview-kicker {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--rose-gold-soft);
    margin-bottom: 10px;
  }
  .theme-preview-names {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(28px, 5vw, 48px);
    line-height: 1;
    letter-spacing: -0.01em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .theme-preview-date {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    letter-spacing: 0.1em;
    margin-top: 10px;
    opacity: 0.9;
  }

  /* Program items — each item is its own card block matching other sections */
  .program-item {
    background: var(--ivory);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    margin-bottom: 14px;
    transition: all 0.2s;
    position: relative;
  }
  .program-item:hover {
    border-color: var(--rose-gold-soft);
    box-shadow: var(--shadow);
  }
  .program-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .program-item-index {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--rose-gold);
    font-weight: 500;
  }
  .program-item-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .program-item-row:last-child { margin-bottom: 0; }
  .program-item label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    align-self: center;
  }
  .program-item input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--line);
    background: white;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--charcoal);
    border-radius: var(--radius-sm);
    transition: all 0.2s;
  }
  .program-item input:focus {
    outline: none;
    border-color: var(--rose-gold);
    box-shadow: 0 0 0 3px rgba(184, 163, 122, 0.15);
  }
  .program-item input.time-input {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--deep-wine);
    max-width: 140px;
  }
  .btn-tiny {
    background: transparent;
    border: 1px solid var(--line);
    padding: 8px 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    transition: all 0.2s;
    border-radius: var(--radius-sm);
  }
  .btn-tiny:hover { color: var(--deep-wine); border-color: var(--rose-gold); }

  /* Footer actions */
  .editor-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 28px;
    margin-top: 28px;
    border-top: 1px solid var(--line);
    gap: 12px;
    flex-wrap: wrap;
  }
  .saved-indicator {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .saved-indicator.show { color: var(--rose-gold); }

  /* ===== PUBLIC PAGE ===== */
  .public-page {
    max-width: 100%;
    overflow-x: hidden;
  }

  .hero {
    min-height: 88vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    background-color: var(--cream);
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.40) 50%, rgba(0,0,0,0.55) 100%);
    z-index: 1;
  }
  .hero-inner {
    position: relative;
    z-index: 2;
    text-align: center;
    color: white;
    padding: 32px 24px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    /* Center everything: text-align does horizontal, flex column ensures all
       children stack and self-center vertically inside the hero */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hero-kicker {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.4em;
    margin-bottom: 18px;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .hero-names {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(44px, 9vw, 130px);
    line-height: 1.05;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
    word-break: break-word;
    max-width: 100%;
    text-align: center;
  }
  .hero-amp {
    font-family: var(--script);
    font-size: 0.6em;
    color: var(--rose-gold-soft);
    vertical-align: middle;
    margin: 0 0.1em;
    font-weight: 400;
  }
  .hero-date {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(20px, 3vw, 28px);
    letter-spacing: 0.1em;
    margin-bottom: 28px;
  }
  .hero-divider {
    width: 80px;
    height: 1px;
    background: rgba(255,255,255,0.6);
    margin: 0 auto 28px;
    position: relative;
  }
  .hero-divider::before {
    content: '♦';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: transparent;
    color: rgba(255,255,255,0.8);
    padding: 0 12px;
    font-size: 10px;
  }

  /* Countdown — bigger, more dramatic */
  .countdown {
    display: flex;
    gap: 28px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .countdown-unit {
    min-width: 100px;
    text-align: center;
  }
  .countdown-num {
    font-family: var(--serif);
    font-size: clamp(56px, 8vw, 96px);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .countdown-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-top: 10px;
    font-weight: 500;
  }
  .countdown-celebrate {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.3;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .countdown-mini {
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-style: normal;
    opacity: 0.8;
    font-family: var(--sans);
  }

  /* Sections — tighter spacing throughout */
  .sec {
    padding: 64px 24px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .sec-head {
    text-align: center;
    margin-bottom: 36px;
  }
  .sec-head .kicker {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--rose-gold);
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .sec-head h2 {
    font-family: var(--serif);
    font-size: clamp(32px, 4.5vw, 48px);
    font-weight: 300;
    color: var(--deep-wine);
    line-height: 1.1;
  }
  .sec-head h2 em {
    font-family: var(--script);
    font-style: normal;
    color: var(--rose-gold);
    font-weight: 600;
  }
  .sec-head .sub {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--muted);
    margin-top: 10px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  .story-text {
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.7;
    color: var(--charcoal);
    text-align: left;
    max-width: 680px;
    margin: 0 auto;
    font-weight: 400;
  }
  .story-text p { margin-bottom: 16px; }
  .story-text p:first-child::first-letter {
    font-family: var(--script);
    font-size: 3.5em;
    float: left;
    color: var(--rose-gold);
    line-height: 0.85;
    margin-right: 10px;
    margin-top: 8px;
  }

  /* HORIZONTAL Timeline — events flow left-to-right along a line */
  .timeline-h {
    position: relative;
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px 0 20px;
  }
  .timeline-h-track {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(0, 1fr);
    gap: 12px;
    position: relative;
    align-items: start;
  }
  /* Horizontal line behind dots */
  .timeline-h-track::before {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    top: 38px;
    height: 1px;
    background: var(--rose-gold-soft);
    z-index: 0;
  }
  .tl-h-item {
    text-align: center;
    position: relative;
    padding: 0 6px;
    z-index: 1;
  }
  .tl-h-time {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    color: var(--rose-gold);
    margin-bottom: 14px;
    letter-spacing: 0.04em;
  }
  .tl-h-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--rose-gold);
    margin: 0 auto 14px;
    box-shadow: 0 0 0 5px var(--ivory), 0 0 0 6px var(--rose-gold-soft);
    position: relative;
    z-index: 2;
  }
  .tl-h-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    color: var(--deep-wine);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .tl-h-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
    font-family: var(--serif);
  }

  /* Info cards — compact */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .info-card {
    background: white;
    border: 1px solid var(--line);
    padding: 24px 20px;
    text-align: center;
    transition: all 0.3s;
    border-radius: var(--radius-lg);
  }
  .info-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-4px);
  }
  .info-icon {
    width: 44px;
    height: 44px;
    border: 1px solid var(--rose-gold);
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--rose-gold);
    margin-bottom: 12px;
    font-size: 18px;
  }
  .info-card h3 {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    color: var(--deep-wine);
    margin-bottom: 6px;
  }
  .info-card p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* RSVP — wider, less tall */
  .rsvp-wrap {
    max-width: 880px;
    margin: 0 auto;
    background: white;
    padding: 36px 44px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: var(--radius-xl);
  }
  .rsvp-wrap h2 {
    font-family: var(--serif);
    font-size: 36px;
    font-weight: 400;
    color: var(--deep-wine);
    text-align: center;
    margin-bottom: 8px;
  }
  .rsvp-wrap > p.center-italic {
    text-align: center;
    font-style: italic;
    color: var(--muted);
    font-family: var(--serif);
    font-size: 17px;
    margin-bottom: 28px;
  }
  /* 2-column form layout — left: choice + email + count, right: names list */
  .rsvp-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    margin-bottom: 18px;
  }
  .rsvp-col { display: flex; flex-direction: column; gap: 14px; }
  .rsvp-col .field { margin-bottom: 0; }
  .rsvp-radio {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }
  .rsvp-radio label {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--line);
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    border-radius: var(--radius-md);
  }
  .rsvp-radio input { display: none; }
  .rsvp-radio input:checked + label,
  .rsvp-radio label.checked {
    background: var(--rose-gold);
    color: white;
    border-color: var(--rose-gold);
  }

  /* Guest count stepper — − [N] + */
  .guest-count-stepper {
    display: flex;
    align-items: stretch;
    max-width: 200px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--ivory);
  }
  .guest-count-btn {
    width: 48px;
    border: none;
    background: var(--cream);
    color: var(--deep-wine);
    font-family: var(--serif);
    font-size: 24px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .guest-count-btn:hover {
    background: var(--rose-gold);
    color: white;
  }
  .guest-count-btn:active { transform: scale(0.95); }
  #r_guests {
    flex: 1;
    border: none !important;
    text-align: center;
    background: transparent !important;
    font-family: var(--serif) !important;
    font-size: 22px !important;
    font-weight: 500 !important;
    color: var(--deep-wine) !important;
    padding: 8px !important;
    cursor: default;
    -moz-appearance: textfield;
  }
  #r_guests::-webkit-outer-spin-button,
  #r_guests::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* Guest list — one row per attendee, with name input + yes/no toggle */
  .guest-names-list {
    display: grid;
    gap: 8px;
  }
  .guest-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .guest-num {
    font-family: var(--serif);
    font-style: italic;
    font-size: 18px;
    color: var(--rose-gold);
    width: 22px;
    flex-shrink: 0;
    text-align: right;
  }
  .guest-name-input {
    flex: 1;
    margin: 0;
    min-width: 0; /* allows shrinking inside flex */
  }
  /* Yes / No toggle pill — compact, two pickable buttons side by side */
  .guest-att-toggle {
    display: inline-flex;
    flex-shrink: 0;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 3px;
    gap: 0;
  }
  .guest-att-btn {
    width: 36px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: 100px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.15s;
    padding: 0;
  }
  .guest-att-btn:hover {
    color: var(--deep-wine);
  }
  .guest-att-btn.att-yes.is-active {
    background: var(--rose-gold);
    color: white;
    box-shadow: 0 1px 4px rgba(184, 163, 122, 0.4);
  }
  .guest-att-btn.att-no.is-active {
    background: #8a7e6c;
    color: white;
  }
  .guest-att-btn.is-active:hover {
    color: white;
  }
  html[data-theme="dark"] .guest-att-toggle { background: var(--cream); }

  .rsvp-success {
    text-align: center;
    padding: 40px 20px;
  }
  .rsvp-success .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--rose-gold);
    color: white;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .rsvp-success-actions {
    margin-top: 28px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .rsvp-success-actions .btn {
    gap: 8px;
  }

  /* Guest list display */
  .guests-mini {
    margin-top: 40px;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 15px;
  }

  /* Public page footer */
  .public-footer {
    background: var(--deep-wine);
    color: var(--cream);
    text-align: center;
    padding: 40px 24px;
  }
  .public-footer .mono {
    font-family: var(--script);
    font-size: 32px;
    color: var(--rose-gold-soft);
    margin-bottom: 8px;
  }
  .public-footer p {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .public-footer .credit {
    margin-top: 22px;
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 0.2em;
  }

  /* Share modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(44, 36, 32, 0.55);
    backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--ivory);
    max-width: 480px;
    width: 100%;
    padding: 44px 36px;
    position: relative;
    border: 1px solid var(--rose-gold-soft);
    box-shadow: var(--shadow-lg);
    text-align: center;
    border-radius: var(--radius-xl);
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
  }
  .modal h3 {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 400;
    color: var(--deep-wine);
    margin-bottom: 8px;
  }
  .modal p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .qr-box {
    background: white;
    padding: 20px;
    display: inline-block;
    margin-bottom: 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }
  #qrcode canvas, #qrcode img {
    display: block;
  }
  .qr-svg-wrap {
    width: 220px;
    height: 220px;
    display: block;
  }
  .qr-svg-wrap svg {
    display: block;
    width: 100%;
    height: 100%;
  }
  .qr-loading {
    padding: 60px 30px;
    color: var(--muted);
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    text-align: center;
    min-width: 220px;
  }
  .share-link {
    background: white;
    border: 1px solid var(--line);
    padding: 12px;
    font-family: monospace;
    font-size: 12px;
    color: var(--deep-wine);
    word-break: break-all;
    margin-bottom: 14px;
    text-align: left;
    border-radius: var(--radius-sm);
  }
  .share-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .share-warn {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
    padding: 8px 14px;
    background: rgba(201, 169, 97, 0.1);
    border-radius: var(--radius-sm);
  }
  .qr-warning {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 18px 20px;
    background: rgba(201, 169, 97, 0.12);
    border: 1px solid var(--rose-gold-soft);
    border-radius: var(--radius-md);
    margin-bottom: 18px;
    text-align: left;
  }
  .qr-warning svg { color: var(--rose-gold); flex-shrink: 0; margin-top: 2px; }
  .qr-warning strong {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--deep-wine);
    font-weight: 500;
    font-style: italic;
  }
  .qr-warning p {
    font-size: 13px;
    color: var(--muted);
    margin: 4px 0 0;
    line-height: 1.5;
  }

  /* Preview banner */
  .preview-banner {
    background: linear-gradient(90deg, var(--cream), var(--blush));
    color: var(--deep-wine);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    font-size: 13px;
    letter-spacing: 0.1em;
    position: sticky;
    top: 0;
    z-index: 200;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--rose-gold-soft);
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
  }
  .preview-banner .btn-soft {
    background: white;
    color: var(--deep-wine);
    padding: 8px 18px;
    font-size: 11px;
    border: 1px solid var(--rose-gold-soft);
  }
  .preview-banner .btn-soft:hover {
    background: var(--rose-gold);
    color: white;
    border-color: var(--rose-gold);
  }
  .owner-banner {
    background: linear-gradient(90deg, rgba(201,169,97,0.15), rgba(184,163,122,0.18));
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(30px);
    background: var(--deep-wine);
    color: var(--ivory);
    padding: 14px 24px;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.3s;
    z-index: 2000;
    box-shadow: var(--shadow-lg);
    border-radius: 100px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Misc */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    font-family: var(--serif);
    font-style: italic;
    color: var(--muted);
    font-size: 20px;
  }
  .hidden { display: none !important; }

  /* Tablet — 4-col features become 2x2 on tablet (still readable) */
  @media (max-width: 980px) {
    .field-grid-4 { grid-template-columns: 1fr 1fr; }
    .features { grid-template-columns: 1fr 1fr; gap: 16px; }
  }

  @media (max-width: 768px) {
    .topbar { padding: 16px 20px; }
    .landing { padding: 40px 20px 60px; }
    .editor { grid-template-columns: 1fr; padding: 20px; gap: 20px; }
    .editor-nav { position: static; }
    .editor-nav ul { display: flex; overflow-x: auto; gap: 4px; -webkit-overflow-scrolling: touch; }
    .editor-nav li { white-space: nowrap; flex-shrink: 0; }
    .editor-nav h4 { display: none; }
    .editor-nav .nav-tip { display: none; }
    .editor-body { padding: 24px 18px; border-radius: var(--radius-lg); }
    .field-row, .field-grid-4 { grid-template-columns: 1fr; gap: 14px; }
    .field-grid-4 > .field { margin-bottom: 0; }
    .program-item-row { grid-template-columns: 1fr; gap: 6px; }
    .program-item label { font-size: 10px; }
    .program-item input.time-input { max-width: 100%; }
    .sec { padding: 48px 20px; }

    /* Horizontal timeline — stack to vertical cards on mobile */
    .timeline-h-track {
      grid-auto-flow: row;
      grid-auto-columns: auto;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    .timeline-h-track::before { display: none; }
    .tl-h-item { text-align: left; padding-left: 28px; position: relative; }
    .tl-h-time { margin-bottom: 4px; font-size: 22px; }
    .tl-h-dot { position: absolute; left: 8px; top: 8px; margin: 0; }
    .tl-h-title { font-size: 18px; }
    .tl-h-desc { font-size: 13px; }

    /* RSVP form — collapse to single column */
    .rsvp-form-grid { grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
    .rsvp-wrap { padding: 28px 22px; }
    .rsvp-wrap h2 { font-size: 28px; }
    /* Photo tabs — smaller text & icons fit on phones */
    .photo-tab { padding: 9px 8px; font-size: 10px; letter-spacing: 0.05em; }
    .photo-tab svg { width: 12px; height: 12px; }
    /* Theme preview — taller on mobile so names don't crowd */
    .theme-preview { aspect-ratio: 4/3; }
    .theme-preview-names { font-size: 28px; }
    /* Modals fill more of the screen */
    .modal { padding: 32px 22px; max-width: 95vw; }
    .modal h3 { font-size: 26px; }
    /* Share link — break long URL on mobile */
    .share-link { font-size: 11px; padding: 10px; }
    /* Footer buttons stack and stretch */
    .editor-footer { flex-direction: column; align-items: stretch; gap: 14px; }
    .editor-footer > div { width: 100%; }
    .editor-footer > div:first-child { justify-content: space-between; }
    .editor-footer > div:last-child { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .editor-footer > div:last-child .btn { width: 100%; justify-content: center; }
    /* Hero text doesn't need clamping as aggressive */
    .hero { padding: 80px 20px; min-height: 70vh; }
    .hero-names { font-size: clamp(40px, 12vw, 80px) !important; }
    /* Date/time pickers — wider tap targets */
    .dt-trigger { padding: 16px 18px; font-size: 16px; min-height: 56px; }
    /* Inputs comfortable on mobile (16px prevents iOS zoom on focus) */
    .field input, .field textarea, .field select { font-size: 16px; padding: 14px 16px; }
    /* Topbar brand truncates instead of wrapping */
    .brand { gap: 10px; }
    .brand small { display: none; }
    /* RSVP form — smaller padding */
    .rsvp-stats { gap: 6px; }
    .rsvp-stat { padding: 14px 6px; }
    .rsvp-stat-num { font-size: 28px; }
    .rsvp-stat-label { font-size: 9px; letter-spacing: 0.15em; }
    /* Landing features stack as single column on phones */
    .features { grid-template-columns: 1fr; gap: 14px; margin-top: 40px; }
    .feature { padding: 22px 20px; }
  }

  /* Very narrow phones */
  @media (max-width: 380px) {
    .photo-tab span { display: none; }
    .photo-tab svg { width: 16px; height: 16px; }
    .topbar-right .lang-switch button { padding: 6px 8px; font-size: 11px; }
    .editor-body { padding: 20px 14px; }
  }
  /* Print — produce a clean, paper-friendly version of the public page.
     Guests sometimes want to print the invitation or save it as PDF. */
  @media print {
    .topbar, .preview-banner, .countdown, .lang-switch, .theme-toggle,
    .rsvp-wrap, .rsvp-success-actions, .share-link, .toast,
    .modal-backdrop { display: none !important; }
    body { background: #fff !important; color: #000 !important; }
    .hero {
      min-height: auto !important;
      padding: 40px 20px !important;
      background: #fff !important;
      color: #000 !important;
    }
    .hero::before, .hero::after { display: none !important; }
    .hero-inner { max-width: 100% !important; }
    .hero-names { font-size: 54px !important; color: #000 !important; }
    .hero-date { color: #333 !important; }
    .sec { padding: 30px 20px !important; page-break-inside: avoid; }
    .info-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #ccc !important; }
    .tl-h-item { break-inside: avoid; }
    a { color: #000 !important; text-decoration: none !important; }
  }

// ============ PHOTOS (Unsplash, free to use) ============
// Inline SVG illustrations — external images are blocked in sandboxed iframes,

function svgDataUri(svg) {
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

// Helper: build a full-bleed hero SVG with a palette and central scene markup.
function weddingSvg({ bg1, bg2, accent, scene, deco = '' }) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${bg1}"/>
        <stop offset="100%" stop-color="${bg2}"/>
      </linearGradient>
      <radialGradient id="glow" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="900" fill="url(#g)"/>
    <rect width="1200" height="900" fill="url(#glow)"/>
    ${deco}
    ${scene}
  </svg>`;
}

// Storage: synchronous localStorage with in-memory fallback.
// No async/await on the boot path — that's what was causing the
// "Načítavam..." hang when window.storage wasn't available.
const mem = { kv: {} };

function sget(key) {
  try {
    if (typeof localStorage !== 'undefined') {
      const v = localStorage.getItem(key);
      if (v !== null) return v;
    }
  } catch (e) { /* privacy mode / blocked */ }
  return mem.kv[key] || null;
}

function sset(key, value) {
  try {
    if (typeof localStorage !== 'undefined') {
      localStorage.setItem(key, value);
    }
  } catch (e) {
    // Quota exceeded usually means a big custom photo. Warn the user once so
    // they know why their changes aren't persisting.
    if (e && (e.name === 'QuotaExceededError' || e.code === 22 || (e.name || '').includes('Quota'))) {
      if (!sset._warned) {
        sset._warned = true;
        setTimeout(() => {
          toast(state.lang === 'sk'
            ? 'Úložisko je plné. Skúste menšiu fotku.'
            : 'Storage is full. Try a smaller photo.', 4000);
        }, 200);
      }
    }
    /* privacy mode / other blocked cases: fall through to in-memory cache */
  }
  mem.kv[key] = value;
}

// Encode/decode project to URL-safe base64 for shareable links.
// This lets the page work as a real share target: the whole project
// travels in the URL hash, so anyone who opens the link sees the page.
function encodeProjectToHash(proj) {
  try {
    const json = JSON.stringify(proj);
    const bytes = new TextEncoder().encode(json);
    let bin = '';
    bytes.forEach(b => bin += String.fromCharCode(b));
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  } catch (e) { return ''; }
}
function decodeProjectFromHash(hash) {
  try {
    let b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  } catch (e) { return null; }
}

// Pulls the latest RSVP list from storage into the current in-memory project.
// Guests submitting via the shared link write to `wed:<id>`; when the couple
// comes back to edit, we need to pick up those new entries. We merge (rather
// than replace) by deduping on timestamp, so unsaved edits to other fields
// aren't lost.
function syncRsvpsFromStorage() {
  if (!state.project) return;
  const stored = loadProject(state.project.id);
  if (!stored || !Array.isArray(stored.rsvps)) return;
  const current = state.project.rsvps || [];
  const byKey = new Map();
  const keyOf = r => `${r.at || 0}|${(r.name || '').toLowerCase()}|${(r.email || '').toLowerCase()}`;
  current.forEach(r => byKey.set(keyOf(r), r));
  stored.rsvps.forEach(r => {
    const k = keyOf(r);
    if (!byKey.has(k)) byKey.set(k, r);
  });
  const merged = Array.from(byKey.values()).sort((a, b) => (a.at || 0) - (b.at || 0));
  state.project.rsvps = merged;
  // Persist merged list so next save doesn't drop any entries
  sset(`wed:${state.project.id}`, JSON.stringify(state.project));
}

// ============ ROUTER ============
function route() {
  const qs = new URLSearchParams(location.search);
  const publicId = qs.get('id');
  const hash = location.hash.startsWith('#data=') ? location.hash.slice(6) : '';

  // Priority 1: shareable hash link — project embedded in URL
  if (hash) {
    const proj = decodeProjectFromHash(hash);
    if (proj) {
      // Merge-in any locally stored RSVPs for this project id so the owner
      // viewing their own share-link can still see responses that came in.
      const local = loadProject(proj.id);
      if (local && Array.isArray(local.rsvps) && local.rsvps.length) {
        const byKey = new Map();
        const keyOf = r => `${r.at||0}|${(r.name||'').toLowerCase()}|${(r.email||'').toLowerCase()}`;
        (proj.rsvps || []).forEach(r => byKey.set(keyOf(r), r));
        local.rsvps.forEach(r => { if (!byKey.has(keyOf(r))) byKey.set(keyOf(r), r); });
        proj.rsvps = Array.from(byKey.values()).sort((a,b) => (a.at||0) - (b.at||0));
      }
      // Is this the device's own project? (either already in storage or was last opened)
      const lastId = sget('wed:last');
      state.isOwnProject = !!local || lastId === proj.id;
      state.publicProject = proj;
      state.isPublicView = true;
      if (!qs.get('lang')) state.lang = proj.lang || 'sk';
      // Persist so RSVP submissions from guests on this device accumulate
      try { sset(`wed:${proj.id}`, JSON.stringify(proj)); } catch {}
      renderPublic();
      return;
    }
  }

  // Priority 2: classic ?id= link
  if (publicId) {
    const proj = loadProject(publicId);
    if (proj) {
      state.publicProject = proj;
      state.isPublicView = true;
      if (!qs.get('lang')) state.lang = proj.lang || 'sk';
      renderPublic();
      return;
    }
    renderNotFound();
    return;
  }

  // Editor mode
  const last = loadLast();
  if (last && !qs.get('new')) {
    state.project = last;
    renderLanding(true);
  } else if (qs.get('new')) {
    state.project = emptyProject();
    saveProject();
    renderEditor();
  } else {
    renderLanding(false);
  }
}

function goLanding() {
  if (state.project && state.currentSection) {
    flushPendingInputs();
  }
  state.currentSection = null;
  state.isPublicView = false;
  state.previewMode = false;
  renderLanding(!!state.project);
  window.scrollTo({ top: 0 });
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return state.lang === 'sk' ? 'pred chvíľou' : 'just now';
  if (mins < 60) return state.lang === 'sk' ? `pred ${mins} min` : `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return state.lang === 'sk' ? `pred ${hrs} h` : `${hrs} h ago`;
  const days = Math.floor(hrs / 24);
  return state.lang === 'sk' ? `pred ${days} dňami` : `${days} days ago`;
}

function renderLanding(hasExisting) {

function setLang(lang) {
  // Capture any pending text the user has typed but hasn't blurred out of yet.
  // The `input` event handler saves on each keystroke, but if the user hasn't
  // typed since last save the values are already persisted.
  flushPendingInputs();
  state.lang = lang;
  if (state.isPublicView) renderPublic();
  else if (state.currentSection && state.project && document.querySelector('.editor')) renderEditor();
  else renderLanding(!!state.project);
}

// Reads all editor inputs and pushes their values into state.project.
// Used before any non-input-driven re-render so we never lose typed content.
function flushPendingInputs() {
  if (!state.project) return;
  document.querySelectorAll('.editor-body input, .editor-body textarea').forEach(el => {
    const id = el.id;
    if (id && id.startsWith('f_')) {
      state.project[id.slice(2)] = el.value;
    }
    const pi = el.dataset.pi;
    const pf = el.dataset.pf;
    if (pi !== undefined && pf && state.project.program[parseInt(pi)]) {
      state.project.program[parseInt(pi)][pf] = el.value;
    }
  });
  saveProject();
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  sset('wed:theme', next);
  // Reapply project theme — in dark mode it strips overrides, in light mode it restores them
  if (state.project && typeof applyEditorTheme === 'function') applyEditorTheme();
}

function applySavedTheme() {
  const saved = sget('wed:theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else if (!saved && typeof window !== 'undefined' && window.matchMedia) {
    // First visit — respect OS preference
    try {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  }
}

function newProject() {
  state.project = emptyProject();
  state.currentSection = 'basic';
  saveProject();
  renderEditor();
}

// Removes the draft project from storage without confirmation nagging — users
// can just recreate if they change their mind, nothing valuable is lost.
function discardExisting() {
  const lastId = sget('wed:last');
  if (lastId) {
    try {
      if (typeof localStorage !== 'undefined') {
        localStorage.removeItem('wed:' + lastId);
        localStorage.removeItem('wed:last');
      }
    } catch {}
  }
  state.project = null;
  renderLanding(false);
  toast(state.lang === 'sk' ? 'Projekt vymazaný' : 'Project deleted');
}

function continueProject() {
  state.currentSection = 'basic';
  renderEditor();
}

// Considered "complete" when the section has at least one meaningful entry.
// Used to show a checkmark dot in the editor nav as the couple fills things in.
function isSectionComplete(sectionId) {
  const p = state.project;
  if (!p) return false;
  switch (sectionId) {
    case 'basic':
      return !!(p.bride && p.groom && p.date);
    case 'story':
      return !!(p.story && p.story.trim().length > 20);
    case 'program':
      return (p.program || []).some(it => it.title && it.time);
    case 'info':
      return !!(p.dresscode || p.parking || p.accommodation || p.gifts || p.contact);
    case 'photo':
      return !!(p.customPhoto || p.photoId);
    case 'rsvp':
      return (p.rsvps || []).length > 0;
    case 'preview':
      return false; // action section, not a data section
    default:
      return false;
  }
}

// ============ RENDER: EDITOR ============
function renderEditor() {
  applyEditorTheme();
  // Pull fresh RSVPs from storage — guests may have submitted new responses
  // since we last rendered, and those writes happened under `wed:<id>`.
  syncRsvpsFromStorage();
  const app = document.getElementById('app');
  const p = state.project;
  const rsvpCount = (p.rsvps || []).length;
  const sections = [
    { id: 'basic', label: t('nav_basic') },
    { id: 'story', label: t('nav_story') },
    { id: 'program', label: t('nav_program') },
    { id: 'info', label: t('nav_info') },
    { id: 'photo', label: t('nav_photo') },
    { id: 'rsvp', label: t('nav_rsvp') + (rsvpCount > 0 ? ` (${rsvpCount})` : '') },
    { id: 'preview', label: t('nav_preview') }
  ];

  app.innerHTML = `
    ${renderTopbar()}
    <div class="editor">
      <nav class="editor-nav">
        <h4>${state.lang === 'sk' ? 'Sekcie' : 'Sections'}</h4>
        <ul>
          ${sections.map((s, i) => {
            const done = isSectionComplete(s.id);
            return `
            <li class="${s.id === state.currentSection ? 'active' : ''}${done ? ' is-done' : ''}" onclick="goSection('${s.id}')">
              <span class="nav-dot">${done ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : i+1}</span>
              <span class="nav-label">${s.label}</span>
            </li>
          `;}).join('')}
        </ul>
        <div class="nav-tip">
          ${state.lang === 'sk'
            ? '<strong>Tip</strong> Zmeny sa automaticky ukladajú. Môžete sa kedykoľvek vrátiť a upraviť.'
            : '<strong>Tip</strong> Changes save automatically. You can always come back and edit.'}
        </div>
      </nav>
      <div class="editor-body" id="editorBody">
        ${renderSection(state.currentSection)}
      </div>
    </div>
  `;
  hookSection();
}

function goSection(id) {
  // Capture any pending input before re-rendering, so the user doesn't lose
  // anything they typed but haven't yet blurred out of (rare, but possible
  // if they switch sections while still typing).
  flushPendingInputs();
  state.currentSection = id;
  renderEditor();
  // Scroll to top of editor body on mobile
  const body = document.getElementById('editorBody');
  if (body && window.innerWidth < 768) body.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
