<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EFE3"/>
      <stop offset="50%" stop-color="#F2EDE3"/>
      <stop offset="100%" stop-color="#EBE1CF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B7A45"/>
      <stop offset="50%" stop-color="#D4B176"/>
      <stop offset="100%" stop-color="#9B7A45"/>
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur stdDeviation="10"/>
      <feOffset dx="0" dy="4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative corners -->
  <g stroke="#9B7A45" stroke-width="1" fill="none" opacity="0.3">
    <path d="M 60 60 L 60 120 M 60 60 L 120 60"/>
    <path d="M 1140 60 L 1140 120 M 1140 60 L 1080 60"/>
    <path d="M 60 570 L 60 510 M 60 570 L 120 570"/>
    <path d="M 1140 570 L 1140 510 M 1140 570 L 1080 570"/>
  </g>

  <!-- Logo circle -->
  <circle cx="600" cy="180" r="55" fill="none" stroke="#9B7A45" stroke-width="2"/>
  <text x="600" y="205" font-family="Georgia, serif" font-size="56" fill="#9B7A45" text-anchor="middle" font-style="italic">J</text>

  <!-- Thin horizontal line -->
  <line x1="550" y1="275" x2="650" y2="275" stroke="#9B7A45" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="305" font-family="Inter, sans-serif" font-size="14" fill="#9B7A45" text-anchor="middle" letter-spacing="4" font-weight="500">SVADOBNÝ SALÓN JANVEIL</text>

  <!-- Main title -->
  <text x="600" y="380" font-family="Georgia, serif" font-size="56" fill="#1E1910" text-anchor="middle" font-weight="400">Svadobný plánovač</text>

  <!-- Subtitle -->
  <text x="600" y="430" font-family="Georgia, serif" font-size="32" fill="#6B5946" text-anchor="middle" font-style="italic" font-weight="400">zdarma pre každú nevestu</text>

  <!-- Features list -->
  <g font-family="Inter, sans-serif" font-size="16" fill="#4A3F2E" text-anchor="middle">
    <text x="600" y="490">Úlohy · Rozpočet · Hostia · Zasadací poriadok · Harmonogram</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" font-family="Inter, sans-serif" font-size="14" fill="#9B7A45" text-anchor="middle" letter-spacing="3" font-weight="600">JANVEIL.SK/PLANOVAC</text>

  <!-- Decorative diamond -->
  <g transform="translate(600, 115) rotate(45)">
    <rect x="-4" y="-4" width="8" height="8" fill="#9B7A45" opacity="0.6"/>
  </g>
</svg>
